<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Our Days">
<title>Our Days</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230d0c1d'/%3E%3Ctext y='.9em' font-size='80' x='10'%3E%F0%9F%8C%9F%3C/text%3E%3C/svg%3E">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root{
  --bg:#0d0c1d;
  --gold:#f4c95d;
  --gold-dim:rgba(244,201,93,0.3);
  --text:#f0ede6;
  --muted:#9b96b0;
  --paper:#faf7f0;
  --paper-line:#d4c9b0;
  --paper-ink:#2c2820;
}

html,body{height:100%;overflow:hidden;}

body{
  background:var(--bg);
  color:var(--text);
  font-family:Georgia,'Times New Roman',serif;
  background-image:
    radial-gradient(ellipse at 20% 50%,rgba(120,80,200,.15) 0%,transparent 55%),
    radial-gradient(ellipse at 80% 15%,rgba(80,120,200,.10) 0%,transparent 45%),
    radial-gradient(ellipse at 55% 85%,rgba(200,80,100,.08) 0%,transparent 35%);
}

#stars-canvas{position:fixed;inset:0;pointer-events:none;z-index:0;}

#app{
  position:relative;z-index:1;
  height:100vh;height:100dvh;
  display:flex;flex-direction:column;align-items:center;
  padding-top:env(safe-area-inset-top,0);
  padding-bottom:env(safe-area-inset-bottom,0);
}

/* ── Header ── */
#header{
  text-align:center;
  padding:28px 20px 10px;
  width:100%;
}
#date-label{
  font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);
}
#greeting{
  font-size:24px;color:var(--gold);margin-top:6px;font-style:italic;
}
#hint{
  font-size:12px;color:var(--muted);margin-top:8px;min-height:18px;
  transition:color .4s;
}
#hint.complete{color:#a8e6a3;}

/* ── Hand / fan ── */
#hand{
  flex:1;position:relative;width:100%;
  display:flex;align-items:flex-end;justify-content:center;
  padding-bottom:55px;
  perspective:1200px;
}

.cw{
  position:absolute;
  cursor:pointer;
  transform-origin:center bottom;
  -webkit-tap-highlight-color:transparent;
  transition:filter .2s;
}
.cw:active{filter:brightness(1.18);}

.ct{
  width:92px;height:138px;
  border-radius:14px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:9px;
  box-shadow:0 8px 30px rgba(0,0,0,.65),0 0 0 1px rgba(255,255,255,.07);
  position:relative;overflow:hidden;
  user-select:none;
}
.ct::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(155deg,rgba(255,255,255,.13) 0%,transparent 60%);
}

.ct-av{
  width:50px;height:50px;border-radius:50%;
  background:rgba(255,255,255,.18);
  border:2px solid rgba(255,255,255,.28);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;font-weight:bold;color:#fff;
  overflow:hidden;flex-shrink:0;
}
.ct-av img{width:100%;height:100%;object-fit:cover;border-radius:50%;}

.ct-name{font-size:14px;font-weight:bold;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.35);}
.ct-rel{font-size:10px;color:rgba(255,255,255,.7);font-style:italic;text-align:center;padding:0 6px;line-height:1.3;}

.ct-dot{
  position:absolute;top:8px;right:8px;
  width:9px;height:9px;border-radius:50%;
  background:#a8e6a3;box-shadow:0 0 7px rgba(168,230,163,.8);
  display:none;
}
.ct.done .ct-dot{display:block;}

/* ── Editor overlay ── */
#eo{
  position:fixed;inset:0;z-index:100;
  background:rgba(8,7,22,.88);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity .35s ease;
  padding:0 0 env(safe-area-inset-bottom,0);
}
#eo.vis{opacity:1;pointer-events:all;}

#ec{
  width:100%;max-width:440px;
  max-height:calc(100vh - 52px);max-height:calc(100dvh - 52px);
  display:flex;flex-direction:column;
  border-radius:22px 22px 0 0;overflow:hidden;
  transform:translateY(48px);
  transition:transform .38s cubic-bezier(.16,1,.3,1);
}
#eo.vis #ec{transform:translateY(0);}

#eh{
  padding:16px 18px 14px;
  display:flex;align-items:center;gap:14px;
  flex-shrink:0;
}
#ea{
  width:44px;height:44px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:bold;color:#fff;
  border:2px solid rgba(255,255,255,.25);
  flex-shrink:0;overflow:hidden;
}
#ea img{width:100%;height:100%;object-fit:cover;border-radius:50%;}

#etb{flex:1;}
#epn{font-size:19px;font-weight:bold;color:#fff;}
#edl{font-size:11px;color:rgba(255,255,255,.62);margin-top:2px;}

#xcb{
  background:rgba(255,255,255,.12);border:none;color:#fff;
  width:34px;height:34px;border-radius:50%;
  font-size:16px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;-webkit-tap-highlight-color:transparent;
}

#eb{
  flex:1;background:var(--paper);
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:18px 20px 4px;
}
#epr{
  font-size:13px;color:#8a7560;font-style:italic;
  line-height:1.65;margin-bottom:14px;
  padding-bottom:14px;border-bottom:1px solid var(--paper-line);
}
#eta{
  width:100%;min-height:210px;
  background:transparent;border:none;outline:none;
  font-family:Georgia,serif;font-size:16px;line-height:32px;
  color:var(--paper-ink);resize:none;
  background-image:repeating-linear-gradient(
    to bottom,transparent 0,transparent 31px,var(--paper-line) 31px,var(--paper-line) 32px
  );
  caret-color:#5a4a3a;
}
#eta::placeholder{color:#b0a890;font-style:italic;}

#ef{
  background:var(--paper);
  padding:14px 18px 16px;
  border-top:1px solid var(--paper-line);
  display:flex;gap:10px;align-items:center;
  flex-shrink:0;
}
#svb{
  flex:1;padding:13px;border:none;border-radius:10px;
  font-size:16px;font-family:Georgia,serif;font-weight:bold;
  cursor:pointer;color:#fff;
  -webkit-tap-highlight-color:transparent;
  transition:opacity .15s;
}
#svb:active{opacity:.8;}
#hib{
  padding:13px 15px;border:1.5px solid var(--paper-line);
  border-radius:10px;background:transparent;
  color:#8a7560;font-size:13px;font-family:Georgia,serif;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  white-space:nowrap;
}

/* ── History overlay ── */
#ho{
  position:fixed;inset:0;z-index:200;
  background:var(--bg);
  display:flex;flex-direction:column;
  transform:translateY(100%);
  transition:transform .4s cubic-bezier(.16,1,.3,1);
}
#ho.vis{transform:translateY(0);}

#hoh{
  padding:calc(env(safe-area-inset-top,16px) + 14px) 20px 14px;
  display:flex;align-items:center;gap:12px;
  border-bottom:1px solid rgba(255,255,255,.08);
  flex-shrink:0;
}
#hot{font-size:19px;color:var(--gold);flex:1;font-style:italic;}
#hoc{
  background:rgba(255,255,255,.1);border:none;color:#fff;
  width:34px;height:34px;border-radius:50%;
  font-size:16px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;
}

#hl{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 18px 20px;}

.hd{margin-bottom:26px;}
.hd-date{
  font-size:11px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--gold);margin-bottom:10px;
  padding-bottom:6px;border-bottom:1px solid var(--gold-dim);
}
.he{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.05);}
.he:last-child{border-bottom:none;}
.he-dot{
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:bold;color:#fff;flex-shrink:0;margin-top:2px;
  overflow:hidden;
}
.he-dot img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.he-c{flex:1;}
.he-n{font-size:13px;font-weight:bold;color:var(--text);margin-bottom:4px;}
.he-t{font-size:14px;color:var(--muted);line-height:1.65;}

/* ── Photo manager overlay ── */
#pmo{
  position:fixed;inset:0;z-index:300;
  background:rgba(8,7,22,.95);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  display:flex;flex-direction:column;
  transform:translateY(100%);
  transition:transform .4s cubic-bezier(.16,1,.3,1);
}
#pmo.vis{transform:translateY(0);}
#pmh{
  padding:calc(env(safe-area-inset-top,16px) + 14px) 20px 14px;
  display:flex;align-items:center;gap:12px;
  border-bottom:1px solid rgba(255,255,255,.08);
}
#pmt{font-size:19px;color:var(--gold);flex:1;font-style:italic;}
#pmc{
  background:rgba(255,255,255,.1);border:none;color:#fff;
  width:34px;height:34px;border-radius:50%;
  font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;
}
#pml{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px;}
.pm-row{
  display:flex;align-items:center;gap:14px;
  padding:14px 0;border-bottom:1px solid rgba(255,255,255,.06);
}
.pm-row:last-child{border-bottom:none;}
.pm-av{
  width:52px;height:52px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;font-weight:bold;color:#fff;
  flex-shrink:0;overflow:hidden;
}
.pm-av img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.pm-info{flex:1;}
.pm-name{font-size:16px;font-weight:bold;color:var(--text);}
.pm-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.pm-btn{
  padding:9px 14px;border-radius:8px;
  border:1.5px solid rgba(255,255,255,.2);
  background:rgba(255,255,255,.07);
  color:var(--text);font-size:13px;font-family:Georgia,serif;
  cursor:pointer;white-space:nowrap;
}
.pm-hint{
  font-size:12px;color:var(--muted);text-align:center;
  padding:16px 0 0;line-height:1.6;font-style:italic;
}

/* ── Music button ── */
#mb{
  position:fixed;bottom:calc(18px + env(safe-area-inset-bottom,0));right:18px;
  z-index:50;width:46px;height:46px;border-radius:50%;
  border:1.5px solid rgba(255,255,255,.14);
  background:rgba(255,255,255,.07);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  color:var(--muted);font-size:20px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  transition:color .25s,background .25s,border-color .25s;
}
#mb.on{color:var(--gold);background:rgba(244,201,93,.12);border-color:var(--gold-dim);}

/* ── Photos button ── */
#pb{
  position:fixed;bottom:calc(18px + env(safe-area-inset-bottom,0));left:18px;
  z-index:50;width:46px;height:46px;border-radius:50%;
  border:1.5px solid rgba(255,255,255,.14);
  background:rgba(255,255,255,.07);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  color:var(--muted);font-size:18px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  transition:color .25s,background .25s;
}
#pb:hover{color:var(--text);}
</style>
</head>
<body>
<canvas id="stars-canvas"></canvas>

<div id="app">
  <div id="header">
    <div id="date-label"></div>
    <div id="greeting"></div>
    <div id="hint"></div>
  </div>
  <div id="hand"></div>
</div>

<!-- Editor overlay -->
<div id="eo">
  <div id="ec">
    <div id="eh">
      <div id="ea"></div>
      <div id="etb">
        <div id="epn"></div>
        <div id="edl"></div>
      </div>
      <button id="xcb" aria-label="Close">✕</button>
    </div>
    <div id="eb">
      <div id="epr"></div>
      <textarea id="eta" rows="8" placeholder="Write here…"></textarea>
    </div>
    <div id="ef">
      <button id="svb">Save ✦</button>
      <button id="hib">Past Entries</button>
    </div>
  </div>
</div>

<!-- History overlay -->
<div id="ho">
  <div id="hoh">
    <span id="hot">Journal</span>
    <button id="hoc" aria-label="Close">✕</button>
  </div>
  <div id="hl"></div>
</div>

<!-- Photo manager overlay -->
<div id="pmo">
  <div id="pmh">
    <span id="pmt">Family Photos</span>
    <button id="pmc" aria-label="Close">✕</button>
  </div>
  <div id="pml"></div>
</div>

<button id="mb" aria-label="Toggle music">♩</button>
<button id="pb" aria-label="Add photos">📷</button>

<script>
// ─── People ─────────────────────────────────────────────────────────────────
const PEOPLE = [
  {
    id:'kotye', name:'Kotye', relation:'Wife', initial:'K',
    color:'#b05575',
    grad:'linear-gradient(148deg,#c8688a 0%,#8a3a58 100%)',
    prompt:'What was something beautiful about Kotye today — a moment you shared, something she said, or something wonderful you noticed in her?'
  },
  {
    id:'auggie', name:'Auggie', relation:'8 years old', initial:'A',
    color:'#3a7fc1',
    grad:'linear-gradient(148deg,#4a90d2 0%,#285888 100%)',
    prompt:'What was something special about Auggie today — something he did, said, or a moment between the two of you?'
  },
  {
    id:'magnus', name:'Magnus', relation:'Twin · 3 years old', initial:'M',
    color:'#3d8f5f',
    grad:'linear-gradient(148deg,#4da070 0%,#2a6040 100%)',
    prompt:'What was something special about Magnus today — a little moment, a word, or something that made you smile?'
  },
  {
    id:'rowan', name:'Rowan', relation:'Twin · 3 years old', initial:'R',
    color:'#c07830',
    grad:'linear-gradient(148deg,#d08840 0%,#8a5815 100%)',
    prompt:'What was something special about Rowan today — a little moment, a word, or something that made you smile?'
  },
  {
    id:'me', name:'Me', relation:'My own day', initial:'✦',
    color:'#6a4ab0',
    grad:'linear-gradient(148deg,#7a5ac0 0%,#482888 100%)',
    prompt:'What was something special about your own day — a feeling, a moment just for you, or something you\'re quietly grateful for?'
  }
];

// Fan layout for 5 cards: [rotationDeg, translateX, translateY-upward]
const FAN = [
  {r:-22, x:-100, y:28},
  {r:-11, x: -50, y: 9},
  {r:  0, x:   0, y: 0},
  {r: 11, x:  50, y: 9},
  {r: 22, x: 100, y:28},
];

// ─── Storage ─────────────────────────────────────────────────────────────────
const SK = (id,date) => `ourdays_${id}_${date}`;
const today = () => new Date().toISOString().split('T')[0];

function load(id, date){ return localStorage.getItem(SK(id,date)) || ''; }
function save(id, date, text){
  if(text.trim()) localStorage.setItem(SK(id,date), text);
  else localStorage.removeItem(SK(id,date));
}
function loadPhoto(id){ return localStorage.getItem(`ourdays_photo_${id}`) || ''; }
function savePhoto(id, dataUrl){ localStorage.setItem(`ourdays_photo_${id}`, dataUrl); }

function allDates(){
  const s = new Set();
  for(let i=0;i<localStorage.length;i++){
    const k = localStorage.key(i);
    const m = k && k.match(/^ourdays_[^_]+_(\d{4}-\d{2}-\d{2})$/);
    if(m) s.add(m[1]);
  }
  return [...s].sort().reverse();
}

// ─── Date / greeting ─────────────────────────────────────────────────────────
function fmtFull(iso){
  return new Date(iso+'T12:00:00').toLocaleDateString('en-US',
    {weekday:'long',year:'numeric',month:'long',day:'numeric'});
}
function fmtShort(iso){
  return new Date(iso+'T12:00:00').toLocaleDateString('en-US',
    {weekday:'long',month:'long',day:'numeric'});
}
function greeting(){
  const h = new Date().getHours();
  if(h<5)  return 'Still up late…';
  if(h<12) return 'Good morning, family';
  if(h<17) return 'Good afternoon, family';
  if(h<21) return 'Good evening, family';
  return 'Good night, family';
}

// ─── Avatar helper ────────────────────────────────────────────────────────────
function avatarContent(person, el, size){
  const photo = loadPhoto(person.id);
  if(photo){
    const img = document.createElement('img');
    img.src = photo;
    img.alt = person.name;
    el.innerHTML='';
    el.appendChild(img);
  } else {
    el.textContent = person.initial;
    if(size==='sm') el.style.fontSize='20px';
  }
}

// ─── Render hand ─────────────────────────────────────────────────────────────
function renderHand(){
  const hand = document.getElementById('hand');
  hand.innerHTML='';
  const date = today();

  PEOPLE.forEach((p,i)=>{
    const pos = FAN[i];
    const hasEntry = load(p.id, date).trim().length > 0;

    const wrap = document.createElement('div');
    wrap.className='cw';
    wrap.style.transform=`translateX(${pos.x}px) translateY(${-pos.y}px) rotate(${pos.r}deg)`;
    wrap.style.zIndex = i===2?5:(i===1||i===3?4:3);

    const card = document.createElement('div');
    card.className='ct'+(hasEntry?' done':'');
    card.style.background=p.grad;

    const av = document.createElement('div');
    av.className='ct-av';
    avatarContent(p, av, 'md');

    card.innerHTML=`
      <div class="ct-dot"></div>
      <div class="ct-name">${p.name}</div>
      <div class="ct-rel">${p.relation}</div>
    `;
    card.insertBefore(av, card.firstChild);

    wrap.appendChild(card);
    wrap.addEventListener('click',()=>openEditor(p));
    hand.appendChild(wrap);
  });

  updateHint();
}

function updateHint(){
  const date = today();
  const done = PEOPLE.filter(p=>load(p.id,date).trim()).length;
  const el = document.getElementById('hint');
  if(done===0){
    el.textContent='Tap a card to write today\'s note';
    el.classList.remove('complete');
  } else if(done<PEOPLE.length){
    el.textContent=`${done} of ${PEOPLE.length} cards written today`;
    el.classList.remove('complete');
  } else {
    el.textContent='All notes written today ✦';
    el.classList.add('complete');
  }
}

// ─── Editor ──────────────────────────────────────────────────────────────────
let activePerson = null;

function openEditor(person){
  activePerson = person;
  const date = today();

  document.getElementById('eh').style.background = person.grad;
  const av = document.getElementById('ea');
  av.innerHTML='';
  avatarContent(person, av, 'sm');
  document.getElementById('epn').textContent = person.name;
  document.getElementById('edl').textContent = fmtShort(date);
  document.getElementById('epr').textContent = person.prompt;
  document.getElementById('eta').value = load(person.id, date);
  document.getElementById('svb').style.background = person.color;

  document.getElementById('eo').classList.add('vis');
  setTimeout(()=>document.getElementById('eta').focus(), 420);
}

function closeEditor(){
  document.getElementById('eo').classList.remove('vis');
  document.getElementById('eta').blur();
  activePerson = null;
}

document.getElementById('xcb').addEventListener('click', closeEditor);
document.getElementById('eo').addEventListener('click', e=>{
  if(e.target===document.getElementById('eo')) closeEditor();
});

document.getElementById('svb').addEventListener('click',()=>{
  if(!activePerson) return;
  save(activePerson.id, today(), document.getElementById('eta').value);
  closeEditor();
  renderHand();
});

// ─── History ─────────────────────────────────────────────────────────────────
function openHistory(){
  const dates = allDates();
  const hl = document.getElementById('hl');

  if(!dates.length){
    hl.innerHTML='<p style="color:var(--muted);padding:24px;text-align:center;font-style:italic;">No entries yet — start writing today.</p>';
  } else {
    hl.innerHTML = dates.map(date=>{
      const entries = PEOPLE.map(p=>({p, text:load(p.id,date)})).filter(e=>e.text.trim());
      if(!entries.length) return '';
      return `
        <div class="hd">
          <div class="hd-date">${fmtFull(date)}</div>
          ${entries.map(e=>`
            <div class="he">
              <div class="he-dot" style="background:${e.p.color}" data-id="${e.p.id}">
                ${loadPhoto(e.p.id)
                  ? `<img src="${loadPhoto(e.p.id)}" alt="${e.p.name}">`
                  : e.p.initial}
              </div>
              <div class="he-c">
                <div class="he-n">${e.p.name}</div>
                <div class="he-t">${e.text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/\n/g,'<br>')}</div>
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }).join('');
  }

  document.getElementById('ho').classList.add('vis');
}

document.getElementById('hib').addEventListener('click', openHistory);
document.getElementById('hoc').addEventListener('click',()=>document.getElementById('ho').classList.remove('vis'));

// ─── Photo manager ────────────────────────────────────────────────────────────
function openPhotoManager(){
  const list = document.getElementById('pml');
  list.innerHTML = PEOPLE.map(p=>{
    const photo = loadPhoto(p.id);
    return `
      <div class="pm-row">
        <div class="pm-av" style="background:${p.color}" id="pm-av-${p.id}">
          ${photo ? `<img src="${photo}" alt="${p.name}">` : p.initial}
        </div>
        <div class="pm-info">
          <div class="pm-name">${p.name}</div>
          <div class="pm-sub">${photo ? 'Photo saved' : 'No photo yet'}</div>
        </div>
        <button class="pm-btn" onclick="pickPhoto('${p.id}')">${photo ? 'Change' : 'Add Photo'}</button>
      </div>
    `;
  }).join('') + `<p class="pm-hint">Photos are stored only on this device (in browser storage). They appear on the cards and in the journal.</p>`;

  document.getElementById('pmo').classList.add('vis');
}

function pickPhoto(personId){
  const input = document.createElement('input');
  input.type='file'; input.accept='image/*'; input.capture='environment';
  input.style.display='none';
  document.body.appendChild(input);
  input.addEventListener('change',()=>{
    const file = input.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      // Resize to reasonable size before storing
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const maxDim = 400;
        const scale = Math.min(1, maxDim/Math.max(img.width,img.height));
        canvas.width = Math.round(img.width*scale);
        canvas.height = Math.round(img.height*scale);
        canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
        const dataUrl = canvas.toDataURL('image/jpeg',0.85);
        savePhoto(personId, dataUrl);
        document.getElementById('pmo').classList.remove('vis');
        renderHand();
        setTimeout(openPhotoManager, 350);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
    document.body.removeChild(input);
  });
  input.click();
}

document.getElementById('pb').addEventListener('click', openPhotoManager);
document.getElementById('pmc').addEventListener('click',()=>document.getElementById('pmo').classList.remove('vis'));

// ─── Stars ────────────────────────────────────────────────────────────────────
function initStars(){
  const canvas = document.getElementById('stars-canvas');
  const ctx = canvas.getContext('2d');
  const resize = ()=>{ canvas.width=innerWidth; canvas.height=innerHeight; };
  resize();
  window.addEventListener('resize', resize);

  const stars = Array.from({length:130},()=>({
    x:Math.random()*innerWidth,
    y:Math.random()*innerHeight,
    r:Math.random()*1.1+.25,
    a:Math.random()*.7+.2,
    s:Math.random()*.004+.001,
    ph:Math.random()*Math.PI*2
  }));

  let t=0;
  (function tick(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    stars.forEach(s=>{
      const op = s.a*(0.5+0.5*Math.sin(t*s.s*60+s.ph));
      ctx.beginPath();
      ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${op.toFixed(3)})`;
      ctx.fill();
    });
    t++;
    requestAnimationFrame(tick);
  })();
}

// ─── Music (Web Audio — pentatonic piano) ─────────────────────────────────────
let actx=null, master=null, reverb=null, playing=false, musicTimer=null, patIdx=0;

// Pentatonic C major (two octaves: C3–A4)
const PENTA = [130.81,146.83,164.81,196.00,220.00,261.63,293.66,329.63,392.00,440.00];
const BASS  = [65.41,73.42,82.41,98.00,110.00]; // one octave below

function initAudio(){
  if(actx) return;
  actx = new (window.AudioContext||window.webkitAudioContext)();
  master = actx.createGain(); master.gain.value=0.32; master.connect(actx.destination);

  // Simple stereo reverb via two delays
  const d1=actx.createDelay(2); d1.delayTime.value=0.22;
  const d2=actx.createDelay(2); d2.delayTime.value=0.38;
  const fb=actx.createGain(); fb.gain.value=0.22;
  const mix=actx.createGain(); mix.gain.value=0.28;
  d1.connect(fb); d2.connect(fb); fb.connect(d1); fb.connect(d2);
  d1.connect(mix); d2.connect(mix); mix.connect(master);
  reverb = d1; // entry point
}

function note(freq, when, dur, vol){
  const o=actx.createOscillator(), g=actx.createGain();
  const o2=actx.createOscillator(), g2=actx.createGain();
  o.type='triangle'; o.frequency.value=freq;
  o2.type='sine'; o2.frequency.value=freq*2; g2.gain.value=0.1;
  o2.connect(g2); g2.connect(g);
  g.gain.setValueAtTime(0.001,when);
  g.gain.linearRampToValueAtTime(vol,when+0.018);
  g.gain.exponentialRampToValueAtTime(vol*0.45,when+0.22);
  g.gain.exponentialRampToValueAtTime(0.001,when+dur+0.45);
  o.connect(g); g.connect(master); g.connect(reverb);
  o.start(when); o.stop(when+dur+0.6);
  o2.start(when); o2.stop(when+dur+0.6);
}

// Melodic patterns (indices into PENTA)
const MPATS = [
  [0,2,4,2,4,5,4,2, 0,4,2,0],
  [7,5,4,2,4,5,7,5, 4,2,0,2],
  [0,2,4,7,5,4,2,4, 0,2,4,2],
  [4,5,7,5,4,2,4,2, 0,2,0,2],
  [2,4,5,4,2,0,2,4, 5,7,5,4],
];
const BPATS = [
  [0,2,0,2, 0,4,0,4],
  [0,0,2,0, 0,2,0,0],
  [2,0,2,4, 2,0,2,0],
];

function scheduleLoop(startT){
  if(!playing) return;
  const mp = MPATS[patIdx % MPATS.length];
  const bp = BPATS[patIdx % BPATS.length];
  patIdx++;
  const beat=0.52, total=mp.length*beat;

  mp.forEach((ni,i)=>{
    if(Math.random()<0.1) return; // occasional rest
    note(PENTA[ni], startT+i*beat, beat*.88, 0.28+Math.random()*.08);
  });
  bp.forEach((ni,i)=>{
    note(BASS[ni], startT+i*beat*2, beat*1.7, 0.12);
  });

  musicTimer = setTimeout(()=>scheduleLoop(actx.currentTime+0.08),(total-0.55)*1000);
}

function toggleMusic(){
  initAudio();
  playing=!playing;
  const btn=document.getElementById('mb');
  if(playing){
    if(actx.state==='suspended') actx.resume();
    master.gain.setValueAtTime(0.001,actx.currentTime);
    master.gain.linearRampToValueAtTime(0.32,actx.currentTime+1.5);
    btn.classList.add('on'); btn.textContent='♪';
    scheduleLoop(actx.currentTime+0.1);
  } else {
    clearTimeout(musicTimer);
    master.gain.linearRampToValueAtTime(0.001,actx.currentTime+1.8);
    btn.classList.remove('on'); btn.textContent='♩';
  }
}
document.getElementById('mb').addEventListener('click',toggleMusic);

// ─── Init ─────────────────────────────────────────────────────────────────────
function init(){
  document.getElementById('date-label').textContent = fmtFull(today());
  document.getElementById('greeting').textContent = greeting();
  initStars();
  renderHand();
}
init();
</script>
