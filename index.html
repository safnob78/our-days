<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Our Days">
<meta name="theme-color" content="#1b1e4a">
<title>Our Days</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%231b1e4a'/%3E%3Ctext y='.9em' font-size='80' x='10'%3E%F0%9F%8C%9F%3C/text%3E%3C/svg%3E">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root{
  /* Slumberland twilight palette */
  --bg:#1b1e4a;
  --gold:#f0d79a;
  --gold-dim:rgba(240,215,154,0.32);
  --cream:#f3e9cf;
  --navy:#252e72;
  --text:#f3ecd9;
  --muted:#a9a6cf;
  --paper:#fbf6ea;
  --paper-line:#ddd0b4;
  --paper-ink:#2b2740;
}

html{background:var(--bg);}
/* 100vh = the FULL physical screen on iOS standalone (956), whereas 100%/100dvh
   resolve to the safe-area-reduced height (894) and clip content above the home
   indicator. Clip against 100vh so content reaches the true bottom edge. */
html,body{height:100vh;overflow:hidden;}

body{
  background:var(--bg);
  color:var(--text);
  font-family:Georgia,'Times New Roman',serif;
  background-image:
    radial-gradient(ellipse 75% 48% at 50% 20%, rgba(243,233,207,.22) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 6%, rgba(78,96,182,.45) 0%, transparent 55%),
    radial-gradient(ellipse at 14% 92%, rgba(240,182,142,.16) 0%, transparent 50%),
    radial-gradient(ellipse at 86% 96%, rgba(150,210,180,.13) 0%, transparent 46%),
    linear-gradient(180deg,#171a44 0%, #24235c 52%, #2c2768 100%);
}

/* Full-bleed star canvas — 100vh = iOS large viewport, covers behind the toolbar */
#stars-canvas{position:fixed;top:0;left:0;width:100vw;height:100vh;pointer-events:none;z-index:0;}

#app{
  position:relative;z-index:1;
  height:100vh;   /* full physical screen (956) — NOT 100dvh (894, stops at safe line) */
  display:flex;flex-direction:column;align-items:center;
  padding-top:env(safe-area-inset-top,0);
  padding-bottom:0;   /* let cards bleed to the true physical bottom edge */
}

/* ── Header ── */
#header{
  text-align:center;
  padding:30px 20px 10px;
  width:100%;
}
#date-label{
  font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);
}
#greeting{
  font-size:38px;color:var(--gold);margin-top:8px;font-style:italic;line-height:1.1;
  text-shadow:0 1px 16px rgba(240,215,154,.3);
}
#hint{
  font-size:12px;color:var(--muted);margin-top:10px;min-height:18px;
  transition:color .4s;
}
#hint.complete{color:#bfe9b6;}

/* ── Carousel / hand ── */
/* Anchored top:0 with an explicit pixel height set in JS (the SAME value the
   star canvas uses) so its bottom lands on the true physical screen edge.
   iOS's fixed; bottom:0 pins to the safe-area line, not the physical edge —
   which is why a top-anchored, full-pixel-height layer reaches the bottom but
   a bottom-anchored one does not. */
#hand{
  position:fixed;top:0;left:0;width:100%;
  z-index:2;
  touch-action:none;
  perspective:1400px;
}

.cw{
  position:absolute;left:50%;bottom:-70px;
  cursor:pointer;
  transform-origin:center bottom;
  will-change:transform,opacity;
  -webkit-tap-highlight-color:transparent;
  transition:transform .5s cubic-bezier(.22,1,.3,1),opacity .35s ease;
}
#hand.drag .cw{transition:none;}

.ct{
  --cc:#fff;
  width:232px;height:366px;
  border-radius:18px;overflow:hidden;
  display:flex;flex-direction:column;
  background:var(--cc);
  border:4px solid var(--cc);
  box-shadow:0 18px 44px rgba(0,0,0,.55);
  user-select:none;
}
/* Top band = the "thick top border" the name sits on, in the card's pastel color */
.ct-top{
  flex-shrink:0;height:40px;
  display:flex;align-items:center;justify-content:center;
  background:var(--cc);color:var(--navy);
  font-weight:bold;font-size:19px;line-height:1;padding:0 8px;
  text-shadow:0 1px 2px rgba(255,255,255,.4);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.ct-body{position:relative;flex:1;overflow:hidden;}
.ct-grad,.ct-art{position:absolute;inset:0;}
.ct-art{background-size:cover;background-position:center;display:none;}
.ct.has-photo .ct-art{display:block;}
.ct-sheen{
  position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(155deg,rgba(255,255,255,.22) 0%,transparent 42%);
}
.ct-init{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:120px;font-weight:bold;color:var(--navy);opacity:.85;
}
.ct.has-photo .ct-init{display:none;}
.ct-scrim{
  position:absolute;left:0;right:0;bottom:0;height:40%;
  background:linear-gradient(transparent,rgba(18,20,52,.78));
  opacity:0;transition:opacity .3s;
}
.ct.has-photo .ct-scrim{opacity:1;}
.ct-rel{
  position:absolute;left:0;right:0;bottom:0;padding:0 12px 14px;text-align:center;
  font-size:12px;font-style:italic;color:rgba(37,46,114,.7);
}
.ct.has-photo .ct-rel{color:rgba(255,255,255,.9);text-shadow:0 1px 6px rgba(0,0,0,.55);}
.ct-dot{
  position:absolute;top:10px;right:10px;
  width:12px;height:12px;border-radius:50%;
  background:#aef0a2;box-shadow:0 0 9px rgba(174,240,162,.9);
  display:none;z-index:3;
}
.ct.done .ct-dot{display:block;}

/* ── Editor overlay ── */
#eo{
  position:fixed;inset:0;z-index:100;
  background:rgba(14,15,44,.86);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity .35s ease;
  padding:0 0 env(safe-area-inset-bottom,0);
}
#eo.vis{opacity:1;pointer-events:all;}

#ec{
  width:100%;max-width:440px;
  max-height:calc(100vh - 52px);max-height:calc(100dvh - 52px);
  display:flex;flex-direction:column;
  border-radius:22px 22px 0 0;overflow:hidden;
  transform:translateY(48px);
  transition:transform .38s cubic-bezier(.16,1,.3,1),max-height .35s ease,border-radius .35s ease;
}
#eo.vis #ec{transform:translateY(0);}
#ec.full{max-height:100dvh;border-radius:0;}

#egrab{
  height:24px;flex-shrink:0;cursor:grab;touch-action:none;
  display:flex;align-items:center;justify-content:center;
}
#egrab::before{content:'';width:42px;height:5px;border-radius:3px;background:rgba(255,255,255,.55);}

#eh{
  padding:14px 18px 14px;
  display:flex;align-items:center;gap:14px;
  flex-shrink:0;
}
#ea{
  width:44px;height:44px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:bold;color:var(--navy);
  border:2px solid rgba(255,255,255,.4);
  flex-shrink:0;overflow:hidden;background:rgba(255,255,255,.25);
}
#ea img{width:100%;height:100%;object-fit:cover;border-radius:50%;}

#etb{flex:1;}
#epn{font-size:19px;font-weight:bold;color:var(--navy);}
#edl{font-size:11px;color:rgba(37,46,114,.6);margin-top:2px;}

#xcb{
  background:rgba(37,46,114,.16);border:none;color:var(--navy);
  width:34px;height:34px;border-radius:50%;
  font-size:16px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;-webkit-tap-highlight-color:transparent;
}

#eb{
  flex:1;background:var(--paper);
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:18px 20px 4px;
}
#epr{
  font-size:13px;color:#8a7560;font-style:italic;
  line-height:1.65;margin-bottom:14px;
  padding-bottom:14px;border-bottom:1px solid var(--paper-line);
}
#eta{
  width:100%;min-height:210px;
  background:transparent;border:none;outline:none;
  font-family:Georgia,serif;font-size:16px;line-height:32px;
  color:var(--paper-ink);resize:none;
  background-image:repeating-linear-gradient(
    to bottom,transparent 0,transparent 31px,var(--paper-line) 31px,var(--paper-line) 32px
  );
  caret-color:#5a4a3a;
}
#eta::placeholder{color:#b0a890;font-style:italic;}

#enotepix{padding:8px 0 18px;}
#epix-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
#epix-grid:empty{display:none;}
.epx{position:relative;}
.epx img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:9px;display:block;border:1px solid var(--paper-line);}
.epx-x{
  position:absolute;top:5px;right:5px;width:22px;height:22px;border-radius:50%;
  background:rgba(0,0,0,.55);color:#fff;border:none;font-size:12px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
#epix-add{
  margin-top:12px;width:100%;padding:11px;
  border:1.5px dashed var(--paper-line);border-radius:10px;background:transparent;
  color:#8a7560;font-family:Georgia,serif;font-size:13px;cursor:pointer;
}

#ef{
  background:var(--paper);
  padding:14px 18px 16px;
  border-top:1px solid var(--paper-line);
  display:flex;gap:10px;align-items:center;
  flex-shrink:0;
}
#svb{
  flex:1;padding:13px;border:none;border-radius:10px;
  font-size:16px;font-family:Georgia,serif;font-weight:bold;
  cursor:pointer;color:#fff;
  -webkit-tap-highlight-color:transparent;
  transition:opacity .15s;
}
#svb:active{opacity:.8;}
#hib{
  padding:13px 15px;border:1.5px solid var(--paper-line);
  border-radius:10px;background:transparent;
  color:#8a7560;font-size:13px;font-family:Georgia,serif;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  white-space:nowrap;
}

/* ── History overlay ── */
#ho{
  position:fixed;inset:0;z-index:200;
  background:var(--bg);
  background-image:linear-gradient(180deg,#171a44 0%,#26235e 100%);
  display:flex;flex-direction:column;
  transform:translateY(100%);
  transition:transform .4s cubic-bezier(.16,1,.3,1);
}
#ho.vis{transform:translateY(0);}

#hoh{
  padding:calc(env(safe-area-inset-top,16px) + 14px) 20px 14px;
  display:flex;align-items:center;gap:12px;
  border-bottom:1px solid rgba(255,255,255,.08);
  flex-shrink:0;
}
#hot{font-size:19px;color:var(--gold);flex:1;font-style:italic;}
#hoc{
  background:rgba(255,255,255,.1);border:none;color:#fff;
  width:34px;height:34px;border-radius:50%;
  font-size:16px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;
}

#hl{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 18px 20px;}

.hd{margin-bottom:26px;}
.hd-date{
  font-size:11px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--gold);margin-bottom:10px;
  padding-bottom:6px;border-bottom:1px solid var(--gold-dim);
}
.he{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.05);}
.he:last-child{border-bottom:none;}
.he-dot{
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:bold;color:#fff;flex-shrink:0;margin-top:2px;
  overflow:hidden;
}
.he-dot img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.he-c{flex:1;min-width:0;}
.he-n{font-size:13px;font-weight:bold;color:var(--text);margin-bottom:4px;}
.he-t{font-size:14px;color:var(--muted);line-height:1.65;}
.he-pix{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px;}
.he-pix img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:6px;display:block;}

/* ── Photo manager overlay ── */
#pmo{
  position:fixed;inset:0;z-index:300;
  background:rgba(14,15,44,.95);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  display:flex;flex-direction:column;
  transform:translateY(100%);
  transition:transform .4s cubic-bezier(.16,1,.3,1);
}
#pmo.vis{transform:translateY(0);}
#pmh{
  padding:calc(env(safe-area-inset-top,16px) + 14px) 20px 14px;
  display:flex;align-items:center;gap:12px;
  border-bottom:1px solid rgba(255,255,255,.08);
}
#pmt{font-size:19px;color:var(--gold);flex:1;font-style:italic;}
#pmc{
  background:rgba(255,255,255,.1);border:none;color:#fff;
  width:34px;height:34px;border-radius:50%;
  font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;
}
#pml{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px;}
.pm-row{
  display:flex;align-items:center;gap:14px;
  padding:14px 0;border-bottom:1px solid rgba(255,255,255,.06);
}
.pm-row:last-child{border-bottom:none;}
.pm-av{
  width:52px;height:52px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;font-weight:bold;color:#fff;
  flex-shrink:0;overflow:hidden;
}
.pm-av img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.pm-info{flex:1;}
.pm-name{font-size:16px;font-weight:bold;color:var(--text);}
.pm-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.pm-btn{
  padding:9px 14px;border-radius:8px;
  border:1.5px solid rgba(255,255,255,.2);
  background:rgba(255,255,255,.07);
  color:var(--text);font-size:13px;font-family:Georgia,serif;
  cursor:pointer;white-space:nowrap;
}
.pm-hint{
  font-size:12px;color:var(--muted);text-align:center;
  padding:16px 0 0;line-height:1.6;font-style:italic;
}

/* ── Music overlay ── */
#muo{
  position:fixed;inset:0;z-index:300;
  background:rgba(14,15,44,.95);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  display:flex;flex-direction:column;
  transform:translateY(100%);
  transition:transform .4s cubic-bezier(.16,1,.3,1);
}
#muo.vis{transform:translateY(0);}
#muh{
  padding:calc(env(safe-area-inset-top,16px) + 14px) 20px 14px;
  display:flex;align-items:center;gap:12px;
  border-bottom:1px solid rgba(255,255,255,.08);
}
#mut{font-size:19px;color:var(--gold);flex:1;font-style:italic;}
#muc{
  background:rgba(255,255,255,.1);border:none;color:#fff;
  width:34px;height:34px;border-radius:50%;
  font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;
}
#mul{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:18px 16px 24px;}
.mu-modes{display:flex;gap:8px;margin-bottom:18px;}
.mu-pill{
  flex:1;padding:11px;border-radius:10px;
  border:1.5px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);
  color:var(--muted);font-size:14px;font-family:Georgia,serif;cursor:pointer;
}
.mu-pill.on{color:var(--navy);background:var(--gold);border-color:var(--gold);font-weight:bold;}
.mu-desc{font-size:13px;color:var(--muted);font-style:italic;line-height:1.6;margin-bottom:16px;text-align:center;}
.mu-controls{display:flex;gap:10px;margin-bottom:16px;}
.mu-big{
  flex:1;padding:15px;border-radius:12px;border:none;
  background:var(--gold);color:var(--navy);font-weight:bold;
  font-size:17px;font-family:Georgia,serif;cursor:pointer;
}
.mu-skip{
  width:54px;flex-shrink:0;border-radius:12px;border:1.5px solid var(--gold-dim);
  background:rgba(240,215,154,.12);color:var(--gold);font-size:20px;cursor:pointer;
}
.mu-toggles{display:flex;gap:10px;margin-bottom:14px;}
.mu-tog{
  flex:1;padding:11px;border-radius:10px;
  border:1.5px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);
  color:var(--muted);font-size:13px;font-family:Georgia,serif;cursor:pointer;
}
.mu-tog.on{color:var(--navy);background:#bfe9b6;border-color:#bfe9b6;font-weight:bold;}
.mu-list{margin-bottom:16px;}
.mu-track{
  display:flex;align-items:center;gap:10px;
  padding:12px 4px;border-bottom:1px solid rgba(255,255,255,.07);
}
.mu-track.cur .mu-tn{color:var(--gold);}
.mu-tn{flex:1;font-size:14px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mu-del{
  background:rgba(255,154,154,.14);border:1px solid rgba(255,154,154,.4);color:#ff9a9a;
  width:36px;height:36px;border-radius:9px;font-size:16px;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.mu-add{
  width:100%;padding:13px;border-radius:10px;
  border:1.5px dashed rgba(255,255,255,.25);background:transparent;
  color:var(--text);font-size:14px;font-family:Georgia,serif;cursor:pointer;
}

/* ── Action sheet (photo source picker) ── */
#as{
  position:fixed;inset:0;z-index:400;
  background:rgba(8,7,22,.6);
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .25s;
  padding:0 12px calc(12px + env(safe-area-inset-bottom,0));
}
#as.vis{opacity:1;pointer-events:all;}
#asc{width:100%;max-width:440px;}
.as-grp{background:rgba(44,44,82,.97);border-radius:16px;overflow:hidden;margin-bottom:8px;}
.as-b{
  display:block;width:100%;padding:16px;background:none;border:none;
  border-bottom:1px solid rgba(255,255,255,.08);
  color:var(--text);font-size:16px;font-family:Georgia,serif;cursor:pointer;
}
.as-b:last-child{border-bottom:none;}
.as-b.danger{color:#ff9a9a;}
.as-cancel{font-weight:bold;color:var(--gold);}

/* ── Floating buttons ── */
#mb,#pb{
  position:fixed;bottom:calc(18px + env(safe-area-inset-bottom,0));
  z-index:96;width:46px;height:46px;border-radius:50%;
  border:1.5px solid rgba(255,255,255,.16);
  background:rgba(255,255,255,.08);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  color:var(--muted);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  transition:color .25s,background .25s,border-color .25s;
}
#mb{right:18px;font-size:20px;}
#pb{left:18px;font-size:18px;}
#mb.on{color:var(--gold);background:rgba(240,215,154,.14);border-color:var(--gold-dim);}
#pb:active{color:var(--text);}

/* TEMP DEBUG — remove later */
#dbg{
  position:fixed;left:6px;top:calc(env(safe-area-inset-top,0) + 44px);
  z-index:9999;font:11px ui-monospace,Menlo,monospace;color:#fff;
  background:rgba(0,0,0,.6);padding:5px 7px;border-radius:6px;
  white-space:pre;pointer-events:none;line-height:1.55;
}
</style>
</head>
<body>
<canvas id="stars-canvas"></canvas>

<div id="app">
  <div id="header">
    <div id="date-label"></div>
    <div id="greeting"></div>
    <div id="hint"></div>
  </div>
  <div id="hand"></div>
</div>

<!-- Editor overlay -->
<div id="eo">
  <div id="ec">
    <div id="egrab" title="Swipe up for full screen"></div>
    <div id="eh">
      <div id="ea"></div>
      <div id="etb">
        <div id="epn"></div>
        <div id="edl"></div>
      </div>
      <button id="xcb" aria-label="Close">✕</button>
    </div>
    <div id="eb">
      <div id="epr"></div>
      <textarea id="eta" rows="8" placeholder="Write here…"></textarea>
      <div id="enotepix">
        <div id="epix-grid"></div>
        <button id="epix-add">＋ Add photos from the day</button>
      </div>
    </div>
    <div id="ef">
      <button id="svb">Save ✦</button>
      <button id="hib">Past Entries</button>
    </div>
  </div>
</div>

<!-- History overlay -->
<div id="ho">
  <div id="hoh">
    <span id="hot">Journal</span>
    <button id="hoc" aria-label="Close">✕</button>
  </div>
  <div id="hl"></div>
</div>

<!-- Photo manager overlay -->
<div id="pmo">
  <div id="pmh">
    <span id="pmt">Family Photos</span>
    <button id="pmc" aria-label="Close">✕</button>
  </div>
  <div id="pml"></div>
</div>

<!-- Music overlay -->
<div id="muo">
  <div id="muh">
    <span id="mut">Music</span>
    <button id="muc" aria-label="Close">✕</button>
  </div>
  <div id="mul"></div>
</div>

<!-- Action sheet -->
<div id="as"><div id="asc"></div></div>

<button id="mb" aria-label="Music">♩</button>

// ─── Storage ─────────────────────────────────────────────────────────────────
const SK = (id,date) => `ourdays_${id}_${date}`;
const today = () => new Date().toISOString().split('T')[0];

function load(id, date){ return localStorage.getItem(SK(id,date)) || ''; }
function save(id, date, text){
  if(text.trim()) localStorage.setItem(SK(id,date), text);
  else localStorage.removeItem(SK(id,date));
}
function loadPhoto(id){ return localStorage.getItem(`ourdays_photo_${id}`) || ''; }
function savePhoto(id, dataUrl){ localStorage.setItem(`ourdays_photo_${id}`, dataUrl); }

function allDates(){
  const s = new Set();
  for(let i=0;i<localStorage.length;i++){
    const k = localStorage.key(i);
    const m = k && k.match(/^ourdays_[^_]+_(\d{4}-\d{2}-\d{2})$/);
    if(m) s.add(m[1]);
  }
  return [...s].sort().reverse();
}

function escapeHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Generic IndexedDB (audio tracks + day photos) ────────────────────────────
function openDB(name, store){
  return new Promise((res,rej)=>{
    const r = indexedDB.open(name,1);
    r.onupgradeneeded = () => {
      if(!r.result.objectStoreNames.contains(store))
        r.result.createObjectStore(store,{keyPath:'id'});
    };
    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error);
  });
}
async function idbGetAll(name,store){
  const db = await openDB(name,store);
  return new Promise((res,rej)=>{
    const t = db.transaction(store).objectStore(store).getAll();
    t.onsuccess=()=>res(t.result); t.onerror=()=>rej(t.error);
  });
}
async function idbPut(name,store,rec){
  const db = await openDB(name,store);
  return new Promise((res,rej)=>{
    const t = db.transaction(store,'readwrite').objectStore(store).put(rec);
    t.onsuccess=()=>res(); t.onerror=()=>rej(t.error);
  });
}
async function idbDel(name,store,id){
  const db = await openDB(name,store);
  return new Promise((res,rej)=>{
    const t = db.transaction(store,'readwrite').objectStore(store).delete(id);
    t.onsuccess=()=>res(); t.onerror=()=>rej(t.error);
  });
}

// ─── Date / greeting ─────────────────────────────────────────────────────────
function fmtFull(iso){
  return new Date(iso+'T12:00:00').toLocaleDateString('en-US',
    {weekday:'long',year:'numeric',month:'long',day:'numeric'});
}
function fmtShort(iso){
  return new Date(iso+'T12:00:00').toLocaleDateString('en-US',
    {weekday:'long',month:'long',day:'numeric'});
}

// ─── Avatar helper (circular, for editor + history + photo mgr) ───────────────
function avatarContent(person, el){
  const photo = loadPhoto(person.id);
  if(photo){
    const img = document.createElement('img');
    img.src = photo; img.alt = person.name;
    el.innerHTML=''; el.appendChild(img);
  } else {
    el.textContent = person.initial;
  }
}

// ─── Carousel ─────────────────────────────────────────────────────────────────
let cards = [];          // .cw nodes
let activeIdx = 2;       // centered card (Magnus by default)
const SPREAD = 148;      // px between card centers
const STEP   = 148;      // px of drag per card (== SPREAD → cards track the finger 1:1)
const PROJ   = 130;      // momentum projection (ms)

function renderHand(){
  const hand = document.getElementById('hand');
  hand.innerHTML='';
  cards = [];
  const date = today();

  PEOPLE.forEach((p,i)=>{
    const hasEntry = load(p.id, date).trim().length > 0;
    const photo = loadPhoto(p.id);

    const wrap = document.createElement('div');
    wrap.className='cw';
    wrap.dataset.i = i;

    const card = document.createElement('div');
    card.className='ct'+(hasEntry?' done':'')+(photo?' has-photo':'');
    card.style.setProperty('--cc', p.band);
    card.innerHTML = `
      <div class="ct-top">${escapeHtml(p.name)}</div>
      <div class="ct-body">
        <div class="ct-grad" style="background:${p.grad}"></div>
        <div class="ct-art"></div>
        <div class="ct-sheen"></div>
        <div class="ct-init">${p.initial}</div>
        <div class="ct-scrim"></div>
        <div class="ct-rel">${escapeHtml(p.relation)}</div>
        <div class="ct-dot"></div>
      </div>`;
    if(photo) card.querySelector('.ct-art').style.backgroundImage = `url("${photo}")`;

    wrap.appendChild(card);
    hand.appendChild(wrap);
    cards.push(wrap);
  });

  if(activeIdx > cards.length-1) activeIdx = cards.length-1;
  layout(activeIdx);
  updateHint();
}

function layout(progress){
  cards.forEach((cw,i)=>{
    const d = i - progress;
    const ad = Math.abs(d);
    const x = d * SPREAD;
    const y = ad * 24;
    const sc = Math.max(0.62, 1 - ad*0.15);
    const rot = d * 5;
    const op = Math.max(0.35, 1 - ad*0.32);
    cw.style.transform =
      `translate(calc(-50% + ${x}px), ${y}px) rotate(${rot}deg) scale(${sc})`;
    cw.style.zIndex = String(90 - Math.round(ad*12));
    cw.style.opacity = op.toFixed(2);
  });
}

// Drag / swipe handling with momentum
(function(){
  const hand = document.getElementById('hand');
  let dragging=false, startX=0, startY=0, base=0, moved=false, downIdx=-1;
  let lastX=0, lastT=0, vel=0;

  hand.addEventListener('pointerdown', e=>{
    dragging=true; moved=false;
    startX=lastX=e.clientX; startY=e.clientY; base=activeIdx;
    lastT=performance.now(); vel=0;
    const c=e.target.closest('.cw'); downIdx = c?+c.dataset.i:-1;
    hand.classList.add('drag');
    if(hand.setPointerCapture) try{hand.setPointerCapture(e.pointerId);}catch(_){}
  });

  hand.addEventListener('pointermove', e=>{
    if(!dragging) return;
    const dx=e.clientX-startX, dy=e.clientY-startY;
    if(Math.abs(dx)>5 || Math.abs(dy)>5) moved=true;
    const now=performance.now(), dt=now-lastT;
    if(dt>0) vel = (e.clientX-lastX)/dt;       // px per ms
    lastX=e.clientX; lastT=now;
    let p = base - dx/STEP;
    p = Math.max(0, Math.min(cards.length-1, p));
    layout(p);
  });

  function end(e){
    if(!dragging) return;
    dragging=false; hand.classList.remove('drag');
    if(!moved){
      if(downIdx>=0){
        if(downIdx===activeIdx){ openEditor(PEOPLE[downIdx]); }
        else { activeIdx=downIdx; layout(activeIdx); }
      }
      return;
    }
    const dx=((e.clientX!=null)?e.clientX:startX)-startX;
    let p = base - dx/STEP;
    p -= (vel*PROJ)/STEP;                       // momentum from flick velocity
    activeIdx = Math.max(0, Math.min(cards.length-1, Math.round(p)));
    layout(activeIdx);
  }
  hand.addEventListener('pointerup', end);
  hand.addEventListener('pointercancel', end);
})();

function updateHint(){
  const date = today();
  const done = PEOPLE.filter(p=>load(p.id,date).trim()).length;
  const el = document.getElementById('hint');
  if(done===0){
    el.textContent='Swipe the cards · tap one to write today\'s note';
    el.classList.remove('complete');
  } else if(done<PEOPLE.length){
    el.textContent=`${done} of ${PEOPLE.length} cards written today`;
    el.classList.remove('complete');
  } else {
    el.textContent='All notes written today ✦';
    el.classList.add('complete');
  }
}

// Swipe up on the grab handle → full screen; swipe down → un-full / close
(function(){
  const grab=document.getElementById('egrab'), ec=document.getElementById('ec');
  let y0=null;
  grab.addEventListener('pointerdown', e=>{ y0=e.clientY;
    if(grab.setPointerCapture) try{grab.setPointerCapture(e.pointerId);}catch(_){}
  });
  grab.addEventListener('pointerup', e=>{
    if(y0==null) return;
    const dy=e.clientY-y0; y0=null;
    if(dy<-30) ec.classList.add('full');
    else if(dy>30){ if(ec.classList.contains('full')) ec.classList.remove('full'); else closeEditor(); }
  });
})();

  save(activePerson.id, today(), document.getElementById('eta').value);
  closeEditor();
  renderHand();
});

// ─── Day photos (per person + date, stored in IndexedDB) ──────────────────────
function fileToResizedBlob(file, maxDim, quality){
  return new Promise(res=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const c=document.createElement('canvas');
        const s=Math.min(1, maxDim/Math.max(img.width,img.height));
        c.width=Math.round(img.width*s); c.height=Math.round(img.height*s);
        c.getContext('2d').drawImage(img,0,0,c.width,c.height);
        c.toBlob(b=>res(b),'image/jpeg',quality);
      };
      img.onerror=()=>res(null);
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}
async function dayPhotosFor(person,date){
  const all = await idbGetAll('ourdays_pix','photos').catch(()=>[]);
  return all.filter(r=>r.person===person && r.date===date).sort((a,b)=>a.ts-b.ts);
}
async function renderEditorPix(){
  const grid=document.getElementById('epix-grid');
  editorPixUrls.forEach(u=>URL.revokeObjectURL(u)); editorPixUrls=[];
  if(!activePerson){ grid.innerHTML=''; return; }
  const rows=await dayPhotosFor(activePerson.id, today());
  grid.innerHTML = rows.map(r=>{
    const url=URL.createObjectURL(r.blob); editorPixUrls.push(url);
    return `<div class="epx"><img src="${url}" alt="day photo"><button class="epx-x" onclick="removeDayPhoto('${r.id}')">✕</button></div>`;
  }).join('');
}
async function removeDayPhoto(id){
  await idbDel('ourdays_pix','photos',id).catch(()=>{});
  renderEditorPix();
}
document.getElementById('epix-add').addEventListener('click',()=>{
  if(!activePerson) return;
  const inp=document.createElement('input');
  inp.type='file'; inp.accept='image/*'; inp.multiple=true; inp.style.display='none';
  document.body.appendChild(inp);
  inp.addEventListener('change', async ()=>{
    const person=activePerson.id, date=today();
    for(const f of inp.files){
      const blob=await fileToResizedBlob(f,1100,0.82);
      if(!blob) continue;
      const id=`${person}_${date}_${Date.now()}_${Math.random().toString(36).slice(2)}`;
      await idbPut('ourdays_pix','photos',{id,person,date,blob,ts:Date.now()}).catch(()=>{});
    }
    renderEditorPix();
    document.body.removeChild(inp);
  });
  inp.click();
});

// ─── History ─────────────────────────────────────────────────────────────────
let historyPixUrls = [];
async function openHistory(){
  const dates = allDates();
  const hl = document.getElementById('hl');
  historyPixUrls.forEach(u=>URL.revokeObjectURL(u)); historyPixUrls=[];

  if(!dates.length){
    hl.innerHTML='<p style="color:var(--muted);padding:24px;text-align:center;font-style:italic;">No entries yet — start writing today.</p>';
    document.getElementById('ho').classList.add('vis');
    return;
  }

  const allPix = await idbGetAll('ourdays_pix','photos').catch(()=>[]);
  const pixFor = (pid,date) => allPix.filter(r=>r.person===pid && r.date===date).sort((a,b)=>a.ts-b.ts);

  hl.innerHTML = dates.map(date=>{
    const entries = PEOPLE.map(p=>({p, text:load(p.id,date), pix:pixFor(p.id,date)}))
                          .filter(e=>e.text.trim() || e.pix.length);
    if(!entries.length) return '';
    return `
      <div class="hd">
        <div class="hd-date">${fmtFull(date)}</div>
        ${entries.map(e=>`
          <div class="he">
            <div class="he-dot" style="background:${e.p.color}">
              ${loadPhoto(e.p.id)
                ? `<img src="${loadPhoto(e.p.id)}" alt="${escapeHtml(e.p.name)}">`
                : e.p.initial}
            </div>
            <div class="he-c">
              <div class="he-n">${escapeHtml(e.p.name)}</div>
              ${e.text.trim()?`<div class="he-t">${escapeHtml(e.text).replace(/\n/g,'<br>')}</div>`:''}
              ${e.pix.length?`<div class="he-pix">${e.pix.map(r=>{
                const u=URL.createObjectURL(r.blob); historyPixUrls.push(u);
                return `<img src="${u}" alt="day photo">`;
              }).join('')}</div>`:''}
            </div>
          </div>
        `).join('')}
      </div>`;
  }).join('');

  document.getElementById('ho').classList.add('vis');
}

document.getElementById('hib').addEventListener('click', openHistory);
document.getElementById('hoc').addEventListener('click',()=>{
  document.getElementById('ho').classList.remove('vis');

function fillPhotoManager(){
  const list = document.getElementById('pml');
  list.innerHTML = PEOPLE.map(p=>{

    return `
      <div class="pm-row">
        <div class="pm-av" style="background:${p.color}">

function openPhotoManager(){
  fillPhotoManager();
  document.getElementById('pmo').classList.add('vis');
}

function photoActions(id){
  const has = !!loadPhoto(id);
  document.getElementById('asc').innerHTML = `
    <div class="as-grp">
      <button class="as-b" onclick="filePhoto('${id}')">Choose from Photos or Files</button>
      <button class="as-b" onclick="pastePhoto('${id}')">Paste from Clipboard</button>
      ${has?`<button class="as-b danger" onclick="removePhoto('${id}')">Remove Photo</button>`:''}
    </div>
    <div class="as-grp"><button class="as-b as-cancel" onclick="closeSheet()">Cancel</button></div>`;
  document.getElementById('as').classList.add('vis');
}
function closeSheet(){ document.getElementById('as').classList.remove('vis'); }
document.getElementById('as').addEventListener('click', e=>{
  if(e.target===document.getElementById('as')) closeSheet();
});

function resizeAndSave(dataUrl, id){
  const img = new Image();
  img.onload = () => {
    const canvas = document.createElement('canvas');
    const maxDim = 900;
    const scale = Math.min(1, maxDim/Math.max(img.width,img.height));
    canvas.width = Math.round(img.width*scale);
    canvas.height = Math.round(img.height*scale);
    canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
    try{
      savePhoto(id, canvas.toDataURL('image/jpeg',0.85));
    }catch(err){
      alert('Could not save photo — device storage may be full. Try a smaller image or remove another photo.');
      return;
    }
    afterPhotoChange();
  };
  img.src = dataUrl;
}
function processImageBlob(blob, id){
  const reader = new FileReader();
  reader.onload = e => resizeAndSave(e.target.result, id);
  reader.readAsDataURL(blob);
}
function afterPhotoChange(){
  renderHand();
  if(document.getElementById('pmo').classList.contains('vis')) fillPhotoManager();
  closeSheet();
}
function filePhoto(id){
  const input = document.createElement('input');
  input.type='file'; input.accept='image/*';
  input.style.display='none';
  document.body.appendChild(input);
  input.addEventListener('change',()=>{
    const file = input.files[0];
    if(file) processImageBlob(file, id);
    document.body.removeChild(input);
  });
  input.click();
}
async function pastePhoto(id){
  if(!(navigator.clipboard && navigator.clipboard.read)){
    alert('Clipboard access isn\'t available here. Copy an image, then use "Choose from Photos or Files".');
    return;
  }
  try{
    const items = await navigator.clipboard.read();
    for(const it of items){
      const type = it.types.find(t=>t.startsWith('image/'));
      if(type){ processImageBlob(await it.getType(type), id); return; }
    }
    alert('No image found on the clipboard. Copy an image first, then try again.');
  }catch(err){
    alert('Could not read the clipboard. Copy an image first, then try again.');
  }
}
function removePhoto(id){
  localStorage.removeItem(`ourdays_photo_${id}`);
  afterPhotoChange();
}

document.getElementById('pb').addEventListener('click', openPhotoManager);
document.getElementById('pmc').addEventListener('click',()=>document.getElementById('pmo').classList.remove('vis'));

// ─── Stars (full-screen, slow twinkle, shooting stars) ────────────────────────
function initStars(){
  const canvas = document.getElementById('stars-canvas');
  const ctx = canvas.getContext('2d');
  let stars = [], shooting = [], W=0, H=0;

  function build(){
    // Paint the full device screen so nothing is cut off at the bottom,
    // even behind Safari's toolbar (full bleed in standalone / Home Screen mode).
    W = window.innerWidth;
    H = Math.max(window.innerHeight, document.documentElement.clientHeight, window.screen.height||0);
    canvas.style.width = W+'px';
    canvas.style.height = H+'px';
    const hand = document.getElementById('hand');
    if(hand) hand.style.height = H+'px';
    const dpr = Math.min(window.devicePixelRatio||1, 2);
    canvas.width = Math.round(W*dpr);
    canvas.height = Math.round(H*dpr);
    ctx.setTransform(dpr,0,0,dpr,0,0);
    const count = Math.min(520, Math.round(W*H/6000));
    stars = Array.from({length:count},()=>({
      x:Math.random()*W,
      y:Math.random()*H,
      r:Math.random()*1.2+.3,
      a:Math.random()*.6+.25,
      s:Math.random()*.003+.0007,   // slower twinkle rate
      ph:Math.random()*Math.PI*2
    }));
  }
  build();
  window.addEventListener('resize', build);
  window.addEventListener('orientationchange', ()=>setTimeout(build,300));
  setTimeout(build, 600);   // re-measure after iOS settles the viewport

  let t=0;
  (function tick(){
    ctx.clearRect(0,0,W,H);
    stars.forEach(s=>{
      const op = s.a*(0.5+0.5*Math.sin(t*s.s*22+s.ph));   // slow shimmer
      ctx.beginPath();
      ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(245,238,210,${op.toFixed(3)})`;
      ctx.fill();
    });
    if(Math.random()<0.003 && shooting.length<2){
      shooting.push({
        x:Math.random()*W*0.7, y:Math.random()*H*0.4,
        vx:6+Math.random()*4, vy:2.4+Math.random()*1.6,
        life:0, len:Math.random()*55+45
      });
    }
    shooting = shooting.filter(sh=>{
      sh.x+=sh.vx; sh.y+=sh.vy; sh.life++;
      const tx = sh.x - sh.len, ty = sh.y - sh.len*sh.vy/sh.vx;
      const grad = ctx.createLinearGradient(sh.x,sh.y,tx,ty);
      grad.addColorStop(0,'rgba(247,240,214,.9)');
      grad.addColorStop(1,'rgba(247,240,214,0)');
      ctx.strokeStyle=grad; ctx.lineWidth=1.6;
      ctx.beginPath(); ctx.moveTo(sh.x,sh.y); ctx.lineTo(tx,ty); ctx.stroke();
      return sh.life<75 && sh.x<W+60 && sh.y<H+60;
    });
    t++;
    requestAnimationFrame(tick);
  })();
}

// ─── Music: imported playlist (IndexedDB) ─────────────────────────────────────
const MS = {
  shuffle: localStorage.getItem('ourdays_music_shuffle')==='1',
  loop: localStorage.getItem('ourdays_music_loop')!=='0',
  tracks: [], order: [], pos: 0, url: null,
  audio: new Audio(), playing: false
};
MS.audio.preload='auto';

function saveMSsettings(){
  localStorage.setItem('ourdays_music_shuffle', MS.shuffle?'1':'0');
  localStorage.setItem('ourdays_music_loop', MS.loop?'1':'0');
}
function buildOrder(){
  MS.order = MS.tracks.map((_,i)=>i);
  if(MS.shuffle){
    for(let i=MS.order.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [MS.order[i],MS.order[j]]=[MS.order[j],MS.order[i]];
    }
  }
}
function playPos(pos){
  if(!MS.tracks.length) return;
  const n = MS.order.length;
  MS.pos = ((pos%n)+n)%n;
  const tr = MS.tracks[MS.order[MS.pos]];
  if(MS.url) URL.revokeObjectURL(MS.url);
  MS.url = URL.createObjectURL(tr.blob);
  MS.audio.src = MS.url;
  MS.audio.play().then(()=>{
    MS.playing=true; updateMusicBtn(); renderMusicPanel();
  }).catch(()=>{});
}
MS.audio.addEventListener('ended',()=>{
  if(MS.pos+1 < MS.order.length){ playPos(MS.pos+1); }
  else if(MS.loop){ buildOrder(); playPos(0); }
  else { MS.playing=false; updateMusicBtn(); renderMusicPanel(); }
});
function togglePlaylist(){
  if(!MS.tracks.length){ addTracks(); return; }
  if(MS.playing){
    MS.audio.pause(); MS.playing=false;
  } else {
    if(MS.audio.src){ MS.audio.play(); MS.playing=true; }
    else { buildOrder(); playPos(0); }
  }
  updateMusicBtn(); renderMusicPanel();
}
function nextTrack(){
  if(!MS.tracks.length) return;
  if(MS.pos+1 < MS.order.length) playPos(MS.pos+1);
  else { buildOrder(); playPos(0); }
}
function toggleShuffle(){ MS.shuffle=!MS.shuffle; saveMSsettings(); buildOrder(); renderMusicPanel(); }
function toggleLoop(){ MS.loop=!MS.loop; saveMSsettings(); renderMusicPanel(); }
function addTracks(){
  const inp=document.createElement('input');
  inp.type='file';
  // Broad list so iOS Files shows m4a/aac/etc., not just what audio/* filters to
  inp.accept='.m4a,.mp3,.aac,.wav,.aiff,.aif,.caf,.flac,.ogg,.oga,.opus,.weba,audio/*';
  inp.multiple=true; inp.style.display='none';
  document.body.appendChild(inp);
  inp.addEventListener('change', async ()=>{
    for(const f of inp.files){
      const rec={
        id:Date.now()+'_'+Math.random().toString(36).slice(2),
        name:f.name.replace(/\.[^.]+$/,''),
        blob:f
      };
      try{ await idbPut('ourdays_music','tracks',rec); MS.tracks.push(rec); }catch(_){}
    }
    buildOrder(); renderMusicPanel();
    document.body.removeChild(inp);
  });
  inp.click();
}
async function delTrack(id){
  const wasCurrent = MS.tracks.length && MS.tracks[MS.order[MS.pos]] &&
                     MS.tracks[MS.order[MS.pos]].id===id;
  try{ await idbDel('ourdays_music','tracks',id); }catch(_){}
  MS.tracks = MS.tracks.filter(t=>t.id!==id);
  if(wasCurrent || !MS.tracks.length){ MS.audio.pause(); MS.playing=false; }
  buildOrder(); updateMusicBtn(); renderMusicPanel();
}
async function loadMusic(){
  try{ MS.tracks = await idbGetAll('ourdays_music','tracks'); buildOrder(); }catch(_){}
}
function updateMusicBtn(){
  const b=document.getElementById('mb');
  b.classList.toggle('on', MS.playing);
  b.textContent = MS.playing ? '♪' : '♩';
}
function renderMusicPanel(){
  const el=document.getElementById('mul');
  let html='';
  if(MS.tracks.length){
    html+=`
      <div class="mu-toggles">
        <button class="mu-tog${MS.shuffle?' on':''}" onclick="toggleShuffle()">🔀 Shuffle</button>
        <button class="mu-tog${MS.loop?' on':''}" onclick="toggleLoop()">🔁 Loop</button>
      </div>
      <div class="mu-controls">
        <button class="mu-big" onclick="togglePlaylist()">${MS.playing?'❚❚  Pause':'▶  Play'}</button>
        <button class="mu-skip" onclick="nextTrack()" aria-label="Next">⏭</button>
      </div>
      <div class="mu-list">`+
      MS.tracks.map(t=>{
        const cur = MS.playing && MS.tracks[MS.order[MS.pos]] &&
                    MS.tracks[MS.order[MS.pos]].id===t.id;
        return `<div class="mu-track${cur?' cur':''}">
          <span class="mu-tn">${cur?'♪ ':''}${escapeHtml(t.name)}</span>
          <button class="mu-del" onclick="delTrack('${t.id}')" aria-label="Remove">🗑</button>
        </div>`;
      }).join('')+
      `</div>`;
  } else {
    html+=`<p class="mu-desc">Add audio files from your device to build a playlist you can shuffle and loop. Stored on this device only.</p>`;
  }
  html+=`<button class="mu-add" onclick="addTracks()">＋ Add Audio Files</button>`;
  el.innerHTML=html;
}
function openMusicPanel(){
  renderMusicPanel();
  document.getElementById('muo').classList.add('vis');
}
document.getElementById('mb').addEventListener('click', openMusicPanel);
document.getElementById('muc').addEventListener('click',()=>document.getElementById('muo').classList.remove('vis'));

// ─── TEMP DEBUG readout ───────────────────────────────────────────────────────
function safeInset(side){
  const d=document.createElement('div');
  d.style.cssText=`position:fixed;${side}:0;height:env(safe-area-inset-${side},0px);width:env(safe-area-inset-${side},0px);visibility:hidden;`;
  document.body.appendChild(d);
  const v = side==='top'||side==='bottom' ? d.offsetHeight : d.offsetWidth;
  d.remove(); return v;
}
function vhUnit(unit){
  const d=document.createElement('div');
  d.style.cssText=`position:fixed;top:0;left:0;width:1px;height:100${unit};visibility:hidden;`;
  document.body.appendChild(d);
  const v=d.offsetHeight; d.remove(); return v;
}
function updateDbg(){
  const el=document.getElementById('dbg'); if(!el) return;
  const h=document.getElementById('hand');
  const r=h?h.getBoundingClientRect():{height:0,bottom:0};
  el.textContent =
    `inner   ${window.innerWidth} x ${window.innerHeight}\n`+
    `screen  ${screen.width} x ${screen.height}\n`+
    `safe T/B ${safeInset('top')} / ${safeInset('bottom')}\n`+
    `svh ${vhUnit('svh')}  lvh ${vhUnit('lvh')}\n`+
    `dvh ${vhUnit('dvh')}  vh ${vhUnit('vh')}\n`+
    `hand    h=${Math.round(r.height)}  bottom=${Math.round(r.bottom)}`;
}

// ─── Init ─────────────────────────────────────────────────────────────────────
function init(){
  document.getElementById('date-label').textContent = fmtFull(today());
  document.getElementById('greeting').textContent = 'Remember Always';
  initStars();
  renderHand();
  loadMusic();
  updateDbg();
  [200,800,2000].forEach(t=>setTimeout(updateDbg,t));
  window.addEventListener('resize', updateDbg);
  window.addEventListener('orientationchange', ()=>setTimeout(updateDbg,300));
  if(window.visualViewport){
    visualViewport.addEventListener('resize', updateDbg);
    visualViewport.addEventListener('scroll', updateDbg);
  }
}
init();
</script>
