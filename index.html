<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Our Days">
<meta name="theme-color" content="#1b1e4a">
<title>Our Days</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%231b1e4a'/%3E%3Ctext y='.9em' font-size='80' x='10'%3E%F0%9F%8C%9F%3C/text%3E%3C/svg%3E">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root{
  /* Slumberland twilight palette */
  --bg:#1b1e4a;
  --gold:#f0d79a;
  --gold-dim:rgba(240,215,154,0.32);
  --cream:#f3e9cf;
  --navy:#252e72;
  --text:#f3ecd9;
  --muted:#a9a6cf;
  --paper:#fbf6ea;
  --paper-line:#ddd0b4;
  --paper-ink:#2b2740;
}

html{background:var(--bg);}
/* 100vh = the FULL physical screen on iOS standalone (956), whereas 100%/100dvh
   resolve to the safe-area-reduced height (894) and clip content above the home
   indicator. Clip against 100vh so content reaches the true bottom edge. */
html,body{height:100vh;overflow:hidden;}

body{
  background:var(--bg);
  color:var(--text);
  font-family:Georgia,'Times New Roman',serif;
  background-image:
    radial-gradient(ellipse 75% 48% at 50% 20%, rgba(243,233,207,.22) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 6%, rgba(78,96,182,.45) 0%, transparent 55%),
    radial-gradient(ellipse at 14% 92%, rgba(240,182,142,.16) 0%, transparent 50%),
    radial-gradient(ellipse at 86% 96%, rgba(150,210,180,.13) 0%, transparent 46%),
    linear-gradient(180deg,#171a44 0%, #24235c 52%, #2c2768 100%);
}

/* Full-bleed star canvas — 100vh = iOS large viewport, covers behind the toolbar */
#stars-canvas{position:fixed;top:0;left:0;width:100vw;height:100vh;pointer-events:none;z-index:0;}

#app{
  position:relative;z-index:1;
  height:100vh;   /* full physical screen (956) — NOT 100dvh (894, stops at safe line) */
  display:flex;flex-direction:column;align-items:center;
  padding-top:env(safe-area-inset-top,0);
  padding-bottom:0;   /* let cards bleed to the true physical bottom edge */
}

/* ── Header ── */
#header{
  text-align:center;
  padding:30px 20px 10px;
  width:100%;
}
#date-label{
  font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);
}
#greeting{
  font-size:38px;color:var(--gold);margin-top:8px;font-style:italic;line-height:1.1;
  text-shadow:0 1px 16px rgba(240,215,154,.3);
}
#hint{
  font-size:12px;color:var(--muted);margin-top:10px;min-height:18px;
  transition:color .4s;
}
#hint.complete{color:#bfe9b6;}

/* ── Carousel / hand ── */
/* Anchored top:0 with an explicit pixel height set in JS (the SAME value the
   star canvas uses) so its bottom lands on the true physical screen edge.
   iOS's fixed; bottom:0 pins to the safe-area line, not the physical edge —
   which is why a top-anchored, full-pixel-height layer reaches the bottom but
   a bottom-anchored one does not. */
#hand{
  position:fixed;top:0;left:0;width:100%;
  z-index:2;
  touch-action:none;
  perspective:1400px;
}

.cw{
  position:absolute;left:50%;bottom:-70px;
  cursor:pointer;
  transform-origin:center bottom;
  will-change:transform,opacity;
  -webkit-tap-highlight-color:transparent;
  transition:transform .5s cubic-bezier(.22,1,.3,1),opacity .35s ease;
}
#hand.drag .cw{transition:none;}

.ct{
  --cc:#fff;
  width:232px;height:366px;
  border-radius:18px;overflow:hidden;
  display:flex;flex-direction:column;
  background:var(--cc);
  border:4px solid var(--cc);
  box-shadow:0 18px 44px rgba(0,0,0,.55);
  user-select:none;
}
/* Top band = the "thick top border" the name sits on, in the card's pastel color */
.ct-top{
  flex-shrink:0;height:40px;
  display:flex;align-items:center;justify-content:center;
  background:var(--cc);color:var(--navy);
  font-weight:bold;font-size:19px;line-height:1;padding:0 8px;
  text-shadow:0 1px 2px rgba(255,255,255,.4);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.ct-body{position:relative;flex:1;overflow:hidden;}
.ct-grad,.ct-art{position:absolute;inset:0;}
.ct-art{background-size:cover;background-position:center;display:none;}
.ct.has-photo .ct-art{display:block;}
.ct-sheen{
  position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(155deg,rgba(255,255,255,.22) 0%,transparent 42%);
}
.ct-init{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:120px;font-weight:bold;color:var(--navy);opacity:.85;
}
.ct.has-photo .ct-init{display:none;}
.ct-scrim{
  position:absolute;left:0;right:0;bottom:0;height:40%;
  background:linear-gradient(transparent,rgba(18,20,52,.78));
  opacity:0;transition:opacity .3s;
}
.ct.has-photo .ct-scrim{opacity:1;}
.ct-rel{
  position:absolute;left:0;right:0;bottom:0;padding:0 12px 14px;text-align:center;
  font-size:12px;font-style:italic;color:rgba(37,46,114,.7);
}
.ct.has-photo .ct-rel{color:rgba(255,255,255,.9);text-shadow:0 1px 6px rgba(0,0,0,.55);}
.ct-dot{
  position:absolute;top:10px;right:10px;
  width:12px;height:12px;border-radius:50%;
  background:#aef0a2;box-shadow:0 0 9px rgba(174,240,162,.9);
  display:none;z-index:3;
}
.ct.done .ct-dot{display:block;}

/* ── Editor overlay ── */
#eo{
  position:fixed;inset:0;z-index:100;
  background:rgba(14,15,44,.86);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity .35s ease;
  padding:0 0 env(safe-area-inset-bottom,0);
}
#eo.vis{opacity:1;pointer-events:all;}

#ec{
  width:100%;max-width:440px;
  max-height:calc(100vh - 52px);max-height:calc(100dvh - 52px);
  display:flex;flex-direction:column;
  border-radius:22px 22px 0 0;overflow:hidden;
  transform:translateY(48px);
  transition:transform .38s cubic-bezier(.16,1,.3,1),max-height .35s ease,border-radius .35s ease;
}
#eo.vis #ec{transform:translateY(0);}
#ec.full{max-height:100dvh;border-radius:0;}

#egrab{
  height:24px;flex-shrink:0;cursor:grab;touch-action:none;
  display:flex;align-items:center;justify-content:center;
}
#egrab::before{content:'';width:42px;height:5px;border-radius:3px;background:rgba(255,255,255,.55);}

#eh{
  padding:14px 18px 14px;
  display:flex;align-items:center;gap:14px;
  flex-shrink:0;
}
#ea{
  width:44px;height:44px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:bold;color:var(--navy);
  border:2px solid rgba(255,255,255,.4);
  flex-shrink:0;overflow:hidden;background:rgba(255,255,255,.25);
}
#ea img{width:100%;height:100%;object-fit:cover;border-radius:50%;}

#etb{flex:1;}
#epn{font-size:19px;font-weight:bold;color:var(--navy);}
#edl{font-size:11px;color:rgba(37,46,114,.6);margin-top:2px;}

#xcb{
  background:rgba(37,46,114,.16);border:none;color:var(--navy);
  width:34px;height:34px;border-radius:50%;
  font-size:16px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;-webkit-tap-highlight-color:transparent;
}

#eb{
  flex:1;background:var(--paper);
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:18px 20px 4px;
}
#epr{
  font-size:13px;color:#8a7560;font-style:italic;
  line-height:1.65;margin-bottom:14px;
  padding-bottom:14px;border-bottom:1px solid var(--paper-line);
}
#eta{
  width:100%;min-height:160px;
  background:transparent;border:none;outline:none;
  font-family:Georgia,serif;font-size:16px;line-height:32px;
  color:var(--paper-ink);resize:none;
  background-image:repeating-linear-gradient(
    to bottom,transparent 0,transparent 31px,var(--paper-line) 31px,var(--paper-line) 32px
  );
  caret-color:#5a4a3a;
}
#eta::placeholder{color:#b0a890;font-style:italic;}

/* Today's saved notes (timestamped, editable list) */
#enotes:empty{display:none;}
.enote{padding:11px 0;border-bottom:1px solid var(--paper-line);}
.enote.editing{background:rgba(244,201,93,.16);border-radius:8px;padding:11px 10px;margin:0 -10px;}
.enote-meta{font-size:11px;color:#a8997e;margin-bottom:4px;letter-spacing:.02em;}
.enote-text{font-size:15px;color:var(--paper-ink);line-height:1.55;white-space:pre-wrap;word-wrap:break-word;}
.enote-actions{margin-top:7px;display:flex;gap:18px;}
.enote-actions button{
  background:none;border:none;color:#8a7560;font-size:12px;font-family:Georgia,serif;
  cursor:pointer;padding:0;text-decoration:underline;-webkit-tap-highlight-color:transparent;
}
.enote-actions button.del{color:#b0573a;}
#enew{display:flex;align-items:center;justify-content:space-between;margin:14px 0 2px;}
#enew-label{font-size:12px;color:#a8997e;font-style:italic;}
#ecancel{
  background:none;border:none;color:#b0573a;font-size:12px;font-family:Georgia,serif;
  cursor:pointer;text-decoration:underline;display:none;-webkit-tap-highlight-color:transparent;
}

#enotepix{padding:8px 0 18px;}
#epix-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
#epix-grid:empty{display:none;}
.epx{position:relative;}
.epx img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:9px;display:block;border:1px solid var(--paper-line);}
.epx-x{
  position:absolute;top:5px;right:5px;width:22px;height:22px;border-radius:50%;
  background:rgba(0,0,0,.55);color:#fff;border:none;font-size:12px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.epx-t{font-size:9.5px;color:#a8997e;text-align:center;margin-top:4px;line-height:1.2;}
#epix-add{
  margin-top:12px;width:100%;padding:11px;
  border:1.5px dashed var(--paper-line);border-radius:10px;background:transparent;
  color:#8a7560;font-family:Georgia,serif;font-size:13px;cursor:pointer;
}

/* Voice notes in the editor */
#evoicewrap{padding:6px 0 18px;}
#evoices:empty{display:none;}
.evoice{
  display:flex;align-items:center;gap:10px;
  padding:10px 0;border-bottom:1px solid var(--paper-line);
}
.evoice-play{
  width:38px;height:38px;flex-shrink:0;border-radius:50%;border:none;
  background:var(--navy);color:#fff;font-size:15px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.evoice-c{flex:1;min-width:0;}
.evoice-t{font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:#b8902f;margin-bottom:2px;}
.evoice-x{font-size:14px;color:var(--paper-ink);line-height:1.45;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.evoice-x.none{color:#b0a890;font-style:italic;}
.evoice-del{
  background:none;border:none;color:#b0573a;font-size:12px;font-family:Georgia,serif;
  cursor:pointer;text-decoration:underline;flex-shrink:0;
}
#evoice-add{
  margin-top:12px;width:100%;padding:11px;
  border:1.5px dashed var(--paper-line);border-radius:10px;background:transparent;
  color:#8a7560;font-family:Georgia,serif;font-size:13px;cursor:pointer;
}

/* Voice recording panel */
#vr{
  position:fixed;inset:0;z-index:460;
  background:rgba(10,10,24,.92);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .3s;
  padding:0 0 env(safe-area-inset-bottom,0);
}
#vr.vis{opacity:1;pointer-events:auto;}
#vr-card{
  width:100%;max-width:440px;background:var(--paper);
  border-radius:22px 22px 0 0;padding:8px 20px 22px;
  max-height:calc(100dvh - 40px);overflow-y:auto;
}
#vr-h{display:flex;align-items:center;padding:8px 0 6px;}
#vr-title{flex:1;font-size:17px;font-weight:bold;color:var(--navy);}
#vr-x{background:rgba(37,46,114,.14);border:none;color:var(--navy);width:32px;height:32px;border-radius:50%;font-size:15px;cursor:pointer;}
#vr-stage{text-align:center;padding:14px 0 6px;}
#vr-timer{font-size:30px;font-variant-numeric:tabular-nums;color:var(--paper-ink);font-family:ui-monospace,Menlo,monospace;}
#vr-rec{
  width:74px;height:74px;border-radius:50%;margin:12px auto 8px;
  border:4px solid #d8c0c0;background:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
#vr-dot{width:30px;height:30px;border-radius:50%;background:#d0463c;transition:all .2s;}
#vr.rec #vr-rec{border-color:#e8a0a0;}
#vr.rec #vr-dot{width:24px;height:24px;border-radius:6px;}
#vr-status{font-size:13px;color:#8a7560;font-style:italic;}
#vr-audio{width:100%;margin:6px 0 4px;display:none;}
#vr.has-audio #vr-audio{display:block;}
#vr-tlabel{font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:#b8902f;margin:12px 0 5px;}
#vr-trans{
  width:100%;min-height:90px;background:#fff;border:1px solid var(--paper-line);
  border-radius:10px;padding:10px 12px;font-family:Georgia,serif;font-size:15px;
  line-height:1.5;color:var(--paper-ink);resize:vertical;outline:none;
}
#vr-note{font-size:11px;color:#b07a4a;font-style:italic;margin-top:6px;min-height:14px;}
#vr-keep{display:flex;gap:18px;margin:14px 0 4px;}
#vr-keep label{font-size:13px;color:var(--paper-ink);display:flex;align-items:center;gap:6px;cursor:pointer;}
#vr-keep input{width:17px;height:17px;accent-color:var(--navy);}
#vr-actions{display:flex;gap:10px;margin-top:16px;}
#vr-discard{
  padding:13px 16px;border:1.5px solid var(--paper-line);border-radius:10px;background:transparent;
  color:#b0573a;font-family:Georgia,serif;font-size:14px;cursor:pointer;
}
#vr-save{
  flex:1;padding:13px;border:none;border-radius:10px;background:var(--navy);color:#fff;
  font-family:Georgia,serif;font-size:15px;font-weight:bold;cursor:pointer;
}
#vr-save[disabled]{opacity:.5;}

/* Voice entry in Past Entries */
.he-voice{display:flex;flex-direction:column;gap:6px;margin-top:2px;}
.he-voice audio{width:100%;max-width:280px;height:38px;}

#ef{
  background:var(--paper);
  padding:14px 18px 16px;
  border-top:1px solid var(--paper-line);
  display:flex;gap:10px;align-items:center;
  flex-shrink:0;
}
#svb{
  flex:1;padding:13px;border:none;border-radius:10px;
  font-size:16px;font-family:Georgia,serif;font-weight:bold;
  cursor:pointer;color:#fff;
  -webkit-tap-highlight-color:transparent;
  transition:opacity .15s;
}
#svb:active{opacity:.8;}
#hib{
  padding:13px 15px;border:1.5px solid var(--paper-line);
  border-radius:10px;background:transparent;
  color:#8a7560;font-size:13px;font-family:Georgia,serif;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  white-space:nowrap;
}

/* ── History overlay ── */
#ho{
  position:fixed;inset:0;z-index:200;
  background:var(--bg);
  background-image:linear-gradient(180deg,#171a44 0%,#26235e 100%);
  display:flex;flex-direction:column;
  transform:translateY(100%);
  transition:transform .4s cubic-bezier(.16,1,.3,1);
}
#ho.vis{transform:translateY(0);}

#hoh{
  padding:calc(env(safe-area-inset-top,16px) + 14px) 20px 14px;
  display:flex;align-items:center;gap:12px;
  border-bottom:1px solid rgba(255,255,255,.08);
  flex-shrink:0;
}
#hot{font-size:19px;color:var(--gold);flex:1;font-style:italic;}
#hoc,#hox{
  background:rgba(255,255,255,.1);border:none;color:#fff;
  width:34px;height:34px;border-radius:50%;
  font-size:16px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;-webkit-tap-highlight-color:transparent;flex-shrink:0;
}
#hox{color:var(--gold);font-size:18px;}

#hl{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 18px 20px;}

/* ── Export / backup overlay ── */
#exo{
  position:fixed;inset:0;z-index:320;
  background:rgba(14,15,44,.96);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  display:flex;flex-direction:column;
  transform:translateY(100%);
  transition:transform .4s cubic-bezier(.16,1,.3,1);
}
#exo.vis{transform:translateY(0);}
#exh{
  padding:calc(env(safe-area-inset-top,16px) + 14px) 20px 14px;
  display:flex;align-items:center;gap:12px;
  border-bottom:1px solid rgba(255,255,255,.08);
}
#ext{font-size:19px;color:var(--gold);flex:1;font-style:italic;}
#exc{
  background:rgba(255,255,255,.1);border:none;color:#fff;
  width:34px;height:34px;border-radius:50%;
  font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;
}
#exl{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:18px 16px 24px;}
.ex-btn{
  display:flex;flex-direction:column;align-items:flex-start;gap:3px;
  width:100%;text-align:left;padding:15px 16px;margin-bottom:12px;
  border:1.5px solid rgba(255,255,255,.15);border-radius:12px;
  background:rgba(255,255,255,.05);color:var(--text);
  font-family:Georgia,serif;cursor:pointer;-webkit-tap-highlight-color:transparent;
}
.ex-btn b{font-size:15px;font-weight:bold;}
.ex-btn small{font-size:12px;color:var(--muted);font-style:italic;}
.ex-btn:active{background:rgba(255,255,255,.1);}
.ex-btn[disabled]{opacity:.55;}
.ex-btn.imp{border-style:dashed;margin-top:6px;}
.ex-hint{font-size:12px;color:var(--muted);text-align:center;line-height:1.6;font-style:italic;padding:8px 6px 0;}

.hd{margin-bottom:26px;}
.hd-date{
  font-size:11px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--gold);margin-bottom:10px;
  padding-bottom:6px;border-bottom:1px solid var(--gold-dim);
}
/* Each entry (note OR photo batch) is a self-contained row: avatar + name + time + content */
.he{display:flex;gap:12px;padding:13px 0;border-bottom:1px solid rgba(255,255,255,.06);}
.he:last-child{border-bottom:none;}
.he-dot{
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:bold;color:#fff;flex-shrink:0;margin-top:1px;
  overflow:hidden;
}
.he-dot img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.he-c{flex:1;min-width:0;}
.he-head{display:flex;align-items:baseline;gap:8px;margin-bottom:5px;}
.he-n{font-size:14px;font-weight:bold;color:var(--text);}
.he-time{font-size:11px;letter-spacing:.04em;color:var(--gold);opacity:.85;white-space:nowrap;}
.he-t{font-size:14.5px;color:var(--muted);line-height:1.65;white-space:pre-wrap;word-wrap:break-word;}
.he-pix{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:2px;}
.he-pixfig{margin:0;}
.he-pixfig img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px;display:block;}

/* ── Photo manager overlay ── */
#pmo{
  position:fixed;inset:0;z-index:300;
  background:rgba(14,15,44,.95);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  display:flex;flex-direction:column;
  transform:translateY(100%);
  transition:transform .4s cubic-bezier(.16,1,.3,1);
}
#pmo.vis{transform:translateY(0);}
#pmh{
  padding:calc(env(safe-area-inset-top,16px) + 14px) 20px 14px;
  display:flex;align-items:center;gap:12px;
  border-bottom:1px solid rgba(255,255,255,.08);
}
#pmt{font-size:19px;color:var(--gold);flex:1;font-style:italic;}
#pmc{
  background:rgba(255,255,255,.1);border:none;color:#fff;
  width:34px;height:34px;border-radius:50%;
  font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;
}
#pml{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px;}
.pm-row{
  display:flex;align-items:center;gap:14px;
  padding:14px 0;border-bottom:1px solid rgba(255,255,255,.06);
}
.pm-row:last-child{border-bottom:none;}
.pm-av{
  width:52px;height:52px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;

<script>
// ─── People ─────────────────────────────────────────────────────────────────
const PEOPLE = [
  {
    id:'kotye', name:'Kotye', relation:'Wife', initial:'K',
    color:'#d76d92', band:'#f6c2d2',
    grad:'linear-gradient(155deg,#f6c2d2 0%,#e89bb4 100%)',
    prompt:'What was something beautiful about Kotye today — a moment you shared, something she said, or something wonderful you noticed in her?'
  },
  {
    id:'auggie', name:'Auggie', relation:'8 years old', initial:'A',
    color:'#5f87cf', band:'#bcd4f4',
    grad:'linear-gradient(155deg,#bcd4f4 0%,#90b2e6 100%)',
    prompt:'What was something special about Auggie today — something he did, said, or a moment between the two of you?'
  },
  {
    id:'magnus', name:'Magnus', relation:'Twin · 3 years old', initial:'M',
    color:'#54a877', band:'#c2ecd2',
    grad:'linear-gradient(155deg,#c2ecd2 0%,#92d2ac 100%)',
    prompt:'What was something special about Magnus today — a little moment, a word, or something that made you smile?'
  },
  {
    id:'rowan', name:'Rowan', relation:'Twin · 3 years old', initial:'R',
    color:'#dd9355', band:'#f8d3ad',
    grad:'linear-gradient(155deg,#f8d3ad 0%,#eeb284 100%)',
    prompt:'What was something special about Rowan today — a little moment, a word, or something that made you smile?'
  },
  {
    id:'me', name:'Me', relation:'My own day', initial:'✦',
    color:'#9173c9', band:'#d8c6f0',
    grad:'linear-gradient(155deg,#d8c6f0 0%,#b59ddc 100%)',
    prompt:'What was something special about your own day — a feeling, a moment just for you, or something you\'re quietly grateful for?'
  }
];

// ─── Storage ─────────────────────────────────────────────────────────────────
const SK = (id,date) => `ourdays_${id}_${date}`;
const today = () => new Date().toISOString().split('T')[0];

// Notes: each day holds a timestamped list of note objects {id,text,ts,edited}.
// Older entries were a single plain-text string — migrated on read.
function noteUid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function loadNotes(id, date){
  const raw = localStorage.getItem(SK(id,date));
  if(!raw) return [];
  try{
    const v = JSON.parse(raw);
    if(Array.isArray(v)) return v;
  }catch(_){}
  // legacy single-string note
  return [{ id:'legacy', text:raw, ts:Date.parse(date+'T12:00:00'), edited:null }];
}
function saveNotes(id, date, arr){
  const keep = (arr||[]).filter(n=>n.text && n.text.trim());
  if(keep.length) localStorage.setItem(SK(id,date), JSON.stringify(keep));
  else localStorage.removeItem(SK(id,date));
}
function addNote(id, date, text){
  const arr = loadNotes(id,date);
  arr.push({ id:noteUid(), text:text, ts:Date.now(), edited:null });
  saveNotes(id,date,arr);
}
function updateNote(id, date, noteId, text){
  const arr = loadNotes(id,date);
  const n = arr.find(x=>x.id===noteId);
  if(n){ n.text=text; n.edited=Date.now(); saveNotes(id,date,arr); }
}
function deleteNote(id, date, noteId){
  saveNotes(id, date, loadNotes(id,date).filter(x=>x.id!==noteId));
}
function hasNotes(id, date){ return loadNotes(id,date).some(n=>n.text && n.text.trim()); }

function loadPhoto(id){ return localStorage.getItem(`ourdays_photo_${id}`) || ''; }
function loadPhotoTs(id){ const t=localStorage.getItem(`ourdays_photo_${id}_ts`); return t?+t:null; }
function savePhoto(id, dataUrl){
  localStorage.setItem(`ourdays_photo_${id}`, dataUrl);
  localStorage.setItem(`ourdays_photo_${id}_ts`, Date.now());
}

function allDates(){
  const s = new Set();
  for(let i=0;i<localStorage.length;i++){
    const k = localStorage.key(i);
    const m = k && k.match(/^ourdays_[^_]+_(\d{4}-\d{2}-\d{2})$/);
    if(m) s.add(m[1]);
  }
  return [...s].sort().reverse();
}

function escapeHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Generic IndexedDB (audio tracks + day photos) ────────────────────────────
function openDB(name, store){
  return new Promise((res,rej)=>{
    const r = indexedDB.open(name,1);
    r.onupgradeneeded = () => {
      if(!r.result.objectStoreNames.contains(store))
        r.result.createObjectStore(store,{keyPath:'id'});
    };
    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error);
  });
}
async function idbGetAll(name,store){
  const db = await openDB(name,store);
  return new Promise((res,rej)=>{
    const t = db.transaction(store).objectStore(store).getAll();
    t.onsuccess=()=>res(t.result); t.onerror=()=>rej(t.error);
  });
}
async function idbPut(name,store,rec){
  const db = await openDB(name,store);
  return new Promise((res,rej)=>{
    const t = db.transaction(store,'readwrite').objectStore(store).put(rec);
    t.onsuccess=()=>res(); t.onerror=()=>rej(t.error);
  });
}
async function idbDel(name,store,id){
  const db = await openDB(name,store);
  return new Promise((res,rej)=>{
    const t = db.transaction(store,'readwrite').objectStore(store).delete(id);
    t.onsuccess=()=>res(); t.onerror=()=>rej(t.error);
  });
}

function fmtShort(iso){

}

// ─── Carousel ─────────────────────────────────────────────────────────────────
let cards = [];          // .cw nodes
let activeIdx = 2;       // centered card (Magnus by default)
const SPREAD = 148;      // px between card centers
const STEP   = 148;      // px of drag per card (== SPREAD → cards track the finger 1:1)
const PROJ   = 130;      // momentum projection (ms)

function renderHand(){
  const hand = document.getElementById('hand');
  hand.innerHTML='';
  cards = [];
  const date = today();

  PEOPLE.forEach((p,i)=>{
    const hasEntry_ = hasEntry(p.id, date);
    const photo = loadPhoto(p.id);

    const wrap = document.createElement('div');
    wrap.className='cw';
    wrap.dataset.i = i;

    const card = document.createElement('div');
    card.className='ct'+(hasEntry_?' done':'')+(photo?' has-photo':'');
    card.style.setProperty('--cc', p.band);
    card.innerHTML = `
      <div class="ct-top">${escapeHtml(p.name)}</div>
      <div class="ct-body">
        <div class="ct-grad" style="background:${p.grad}"></div>
        <div class="ct-art"></div>
        <div class="ct-sheen"></div>
        <div class="ct-init">${p.initial}</div>
        <div class="ct-scrim"></div>
        <div class="ct-rel">${escapeHtml(p.relation)}</div>
        <div class="ct-dot"></div>
      </div>`;
    if(photo) card.querySelector('.ct-art').style.backgroundImage = `url("${photo}")`;

    wrap.appendChild(card);
    hand.appendChild(wrap);
    cards.push(wrap);
  });

  if(activeIdx > cards.length-1) activeIdx = cards.length-1;
  layout(activeIdx);
  updateHint();
  requestAnimationFrame(positionLandingZone);
}

// Rebuild the fan instantly (no entrance animation) — used when returning to the
// home screen, which also repaints cards to dodge an iOS rounded-corner glitch.
function renderHandInstant(){
  const hand=document.getElementById('hand');
  hand.classList.add('drag');          // #hand.drag .cw { transition:none }
  renderHand();
  requestAnimationFrame(()=>requestAnimationFrame(()=>hand.classList.remove('drag')));
}

function layout(progress){
  cards.forEach((cw,i)=>{
    const d = i - progress;
    const ad = Math.abs(d);
    const x = d * SPREAD;
    const y = ad * 24;
    const sc = Math.max(0.62, 1 - ad*0.15);
    const rot = d * 5;
    const op = Math.max(0.35, 1 - ad*0.32);
    cw.style.transform =
      `translate(calc(-50% + ${x}px), ${y}px) rotate(${rot}deg) scale(${sc})`;
    cw.style.zIndex = String(90 - Math.round(ad*12));
    cw.style.opacity = op.toFixed(2);
  });
}

// Drag / swipe handling with momentum
(function(){
  const hand = document.getElementById('hand');
  let dragging=false, startX=0, startY=0, base=0, moved=false, downIdx=-1;
  let lastX=0, lastT=0, vel=0;

  hand.addEventListener('pointerdown', e=>{
    dragging=true; moved=false;
    startX=lastX=e.clientX; startY=e.clientY; base=activeIdx;
    lastT=performance.now(); vel=0;
    const c=e.target.closest('.cw'); downIdx = c?+c.dataset.i:-1;
    hand.classList.add('drag');
    if(hand.setPointerCapture) try{hand.setPointerCapture(e.pointerId);}catch(_){}
  });

  hand.addEventListener('pointermove', e=>{
    if(!dragging) return;
    const dx=e.clientX-startX, dy=e.clientY-startY;
    if(Math.abs(dx)>5 || Math.abs(dy)>5) moved=true;
    const now=performance.now(), dt=now-lastT;
    if(dt>0) vel = (e.clientX-lastX)/dt;       // px per ms
    lastX=e.clientX; lastT=now;
    let p = base - dx/STEP;
    p = Math.max(0, Math.min(cards.length-1, p));
    layout(p);
  });

  function end(e){
    if(!dragging) return;
    dragging=false; hand.classList.remove('drag');
    const dx=((e.clientX!=null)?e.clientX:startX)-startX;
    if(!moved){
      if(downIdx>=0){
        if(downIdx===activeIdx){ enlargeCard(PEOPLE[downIdx]); }   // tap center → enlarge to zone
        else { activeIdx=downIdx; layout(activeIdx); }              // tap side → bring to center
      }
      return;
    }
    let p = base - dx/STEP;
    p -= (vel*PROJ)/STEP;                       // momentum from flick velocity
    activeIdx = Math.max(0, Math.min(cards.length-1, Math.round(p)));
    layout(activeIdx);
  }
  hand.addEventListener('pointerup', end);
  hand.addEventListener('pointercancel', end);
})();

function updateHint(){
  const date = today();
  const done = PEOPLE.filter(p=>hasEntry(p.id,date)).length;
  const el = document.getElementById('hint');
  if(done===0){
    el.textContent='Swipe the cards · tap one to write today\'s note';
    el.classList.remove('complete');
  } else if(done<PEOPLE.length){
    el.textContent=`${done} of ${PEOPLE.length} cards written today`;
    el.classList.remove('complete');
  } else {
    el.textContent='All notes written today ✦';
    el.classList.add('complete');
  }
}

function fileToResizedBlob(file, maxDim, quality){
  return new Promise(res=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const c=document.createElement('canvas');
        const s=Math.min(1, maxDim/Math.max(img.width,img.height));
        c.width=Math.round(img.width*s); c.height=Math.round(img.height*s);
        c.getContext('2d').drawImage(img,0,0,c.width,c.height);
        c.toBlob(b=>res(b),'image/jpeg',quality);
      };
      img.onerror=()=>res(null);
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}
async function dayPhotosFor(person,date){
  const all = await idbGetAll('ourdays_pix','photos').catch(()=>[]);
  return all.filter(r=>r.person===person && r.date===date).sort((a,b)=>a.ts-b.ts);
}

    return `<div class="epx"><img src="${url}" alt="day photo" class="zoomable"><button class="epx-x" onclick="removeDayPhoto('${r.id}')">✕</button><div class="epx-t">${r.ts?fmtTime(r.ts):''}</div></div>`;
  }).join('');
}

});

// ─── History ─────────────────────────────────────────────────────────────────
let historyPixUrls = [];
function personById(id){
  return PEOPLE.find(p=>p.id===id) || {id, name:id, initial:'?', color:'#7a7a90', relation:''};
}
const PHOTO_BATCH_MS = 5*60*1000;   // photos added within 5 min count as one entry

// filterPerson (optional): show only that person's entries
async function openHistory(filterPerson){
  if(filterPerson && typeof filterPerson!=='string') filterPerson = null;  // guard against event arg
  const ho=document.getElementById('ho'), hl=document.getElementById('hl');
  historyPixUrls.forEach(u=>URL.revokeObjectURL(u)); historyPixUrls=[];
  document.getElementById('hot').textContent = filterPerson ? `${personById(filterPerson).name} · Journal` : 'Journal';

  const allPix = await idbGetAll('ourdays_pix','photos').catch(()=>[]);

  // Build a flat chronological list of entries (a note, or a batch of photos)
  const items = [];
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    const m=k && k.match(/^ourdays_([^_]+)_(\d{4}-\d{2}-\d{2})$/);
    if(!m) continue;
    const pid=m[1], date=m[2];
    if(filterPerson && pid!==filterPerson) continue;
    loadNotes(pid,date).forEach(n=>{
      if(n.text && n.text.trim())
        items.push({type:'note', pid, date, ts:n.ts||Date.parse(date+'T12:00:00'), note:n});
    });
  }
  const byPD={};
  allPix.forEach(r=>{
    if(filterPerson && r.person!==filterPerson) return;
    (byPD[r.person+'|'+r.date] = byPD[r.person+'|'+r.date] || []).push(r);
  });
  Object.values(byPD).forEach(arr=>{
    arr.sort((a,b)=>(a.ts||0)-(b.ts||0));
    let g=null;
    arr.forEach(r=>{
      const ts=r.ts||Date.parse(r.date+'T12:00:00');
      if(g && ts-g.lastTs<=PHOTO_BATCH_MS){ g.photos.push(r); g.lastTs=ts; }
      else { g={type:'photos', pid:r.person, date:r.date, ts, lastTs:ts, photos:[r]}; items.push(g); }
    });
  });
  const allVoice = await idbGetAll('ourdays_voice','voice').catch(()=>[]);
  allVoice.forEach(v=>{
    if(filterPerson && v.person!==filterPerson) return;
    items.push({type:'voice', pid:v.person, date:v.date, ts:v.ts||Date.parse(v.date+'T12:00:00'), voice:v});
  });

  if(!items.length){
    hl.innerHTML=`<p style="color:var(--muted);padding:40px 24px;text-align:center;font-style:italic;">No entries yet${filterPerson?` for ${escapeHtml(personById(filterPerson).name)}`:''} — start writing today.</p>`;
    ho.classList.add('vis'); updateJumpBtn();
    return;
  }

  // Group by date (ascending), entries within a date by time (ascending) — newest at the bottom
  const byDate={};
  items.forEach(it=>{ (byDate[it.date] = byDate[it.date] || []).push(it); });
  const dates=Object.keys(byDate).sort();

  hl.innerHTML = dates.map(date=>{
    const day = byDate[date].sort((a,b)=>a.ts-b.ts);
    return `<div class="hd"><div class="hd-date">${fmtFull(date)}</div>${
      day.map(it=>{
        const p=personById(it.pid), ph=loadPhoto(it.pid);
        const av=`<div class="he-dot" style="background:${p.color}">${ph?`<img src="${ph}" alt="${escapeHtml(p.name)}" class="zoomable">`:escapeHtml(p.initial)}</div>`;
        const edited = (it.type==='note' && it.note.edited) ? ' · edited' : '';
        let content;
        if(it.type==='note'){
          content=`<div class="he-t">${escapeHtml(it.note.text).replace(/\n/g,'<br>')}</div>`;
        } else if(it.type==='voice'){
          const v=it.voice; let au='';
          if(v.blob){ const u=URL.createObjectURL(v.blob); historyPixUrls.push(u); au=`<audio controls preload="none" src="${u}"></audio>`; }
          content=`<div class="he-voice">${au}${v.transcript?`<div class="he-t">${escapeHtml(v.transcript).replace(/\n/g,'<br>')}</div>`:''}</div>`;
        } else {
          content=`<div class="he-pix">${it.photos.map(r=>{
            const u=URL.createObjectURL(r.blob); historyPixUrls.push(u);
            return `<figure class="he-pixfig"><img src="${u}" alt="day photo" class="zoomable"></figure>`;
          }).join('')}</div>`;
        }
        const tag = it.type==='voice' ? ' 🎙' : '';
        return `<div class="he">${av}<div class="he-c"><div class="he-head"><span class="he-n">${escapeHtml(p.name)}</span><span class="he-time">${fmtTime(it.ts)}${edited}${tag}</span></div>${content}</div></div>`;
      }).join('')
    }</div>`;
  }).join('');

  ho.classList.add('vis');
  // Newest entries are at the bottom — jump there on open
  requestAnimationFrame(()=>{ hl.scrollTop = hl.scrollHeight; updateJumpBtn(); });
}

  const dist = hl.scrollHeight - hl.scrollTop - hl.clientHeight;

function resizeAndSave(dataUrl, id){
  const img = new Image();
  img.onload = () => {
    const canvas = document.createElement('canvas');
    const maxDim = 900;
    const scale = Math.min(1, maxDim/Math.max(img.width,img.height));
    canvas.width = Math.round(img.width*scale);
    canvas.height = Math.round(img.height*scale);
    canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
    try{
      savePhoto(id, canvas.toDataURL('image/jpeg',0.85));
    }catch(err){
      alert('Could not save photo — device storage may be full. Try a smaller image or remove another photo.');
      return;
    }
    afterPhotoChange();
  };
  img.src = dataUrl;
}
function processImageBlob(blob, id){
  const reader = new FileReader();
  reader.onload = e => resizeAndSave(e.target.result, id);
  reader.readAsDataURL(blob);
}
function afterPhotoChange(){
  renderHand();
  if(document.getElementById('pmo').classList.contains('vis')) fillPhotoManager();
  closeSheet();
}
function filePhoto(id){
  const input = document.createElement('input');
  input.type='file'; input.accept='image/*';
  input.style.display='none';
  document.body.appendChild(input);
  input.addEventListener('change',()=>{
    const file = input.files[0];
    if(file) processImageBlob(file, id);
    document.body.removeChild(input);
  });
  input.click();
}
async function pastePhoto(id){
  if(!(navigator.clipboard && navigator.clipboard.read)){
    alert('Clipboard access isn\'t available here. Copy an image, then use "Choose from Photos or Files".');
    return;
  }
  try{
    const items = await navigator.clipboard.read();
    for(const it of items){
      const type = it.types.find(t=>t.startsWith('image/'));
      if(type){ processImageBlob(await it.getType(type), id); return; }
    }
    alert('No image found on the clipboard. Copy an image first, then try again.');
  }catch(err){
    alert('Could not read the clipboard. Copy an image first, then try again.');
  }
}

// ─── Stars (full-screen, slow twinkle, shooting stars) ────────────────────────
function initStars(){
  const canvas = document.getElementById('stars-canvas');
  const ctx = canvas.getContext('2d');
  let stars = [], shooting = [], W=0, H=0;

  function build(){
    // Paint the full device screen so nothing is cut off at the bottom,
    // even behind Safari's toolbar (full bleed in standalone / Home Screen mode).
    W = window.innerWidth;
    H = Math.max(window.innerHeight, document.documentElement.clientHeight, window.screen.height||0);
    canvas.style.width = W+'px';
    canvas.style.height = H+'px';
    const hand = document.getElementById('hand');
    if(hand) hand.style.height = H+'px';
    const dpr = Math.min(window.devicePixelRatio||1, 2);
    canvas.width = Math.round(W*dpr);
    canvas.height = Math.round(H*dpr);
    ctx.setTransform(dpr,0,0,dpr,0,0);
    const count = Math.min(520, Math.round(W*H/6000));
    stars = Array.from({length:count},()=>({
      x:Math.random()*W,
      y:Math.random()*H,
      r:Math.random()*1.2+.3,
      a:Math.random()*.6+.25,
      s:Math.random()*.003+.0007,   // slower twinkle rate
      ph:Math.random()*Math.PI*2
    }));
  }
  build();
  window.addEventListener('resize', build);
  window.addEventListener('orientationchange', ()=>setTimeout(build,300));
  setTimeout(build, 600);   // re-measure after iOS settles the viewport

  let t=0;
  (function tick(){
    ctx.clearRect(0,0,W,H);
    stars.forEach(s=>{
      const op = s.a*(0.5+0.5*Math.sin(t*s.s*22+s.ph));   // slow shimmer
      ctx.beginPath();
      ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(245,238,210,${op.toFixed(3)})`;
      ctx.fill();
    });
    if(Math.random()<0.003 && shooting.length<2){
      shooting.push({
        x:Math.random()*W*0.7, y:Math.random()*H*0.4,
        vx:6+Math.random()*4, vy:2.4+Math.random()*1.6,
        life:0, len:Math.random()*55+45
      });
    }
    shooting = shooting.filter(sh=>{
      sh.x+=sh.vx; sh.y+=sh.vy; sh.life++;
      const tx = sh.x - sh.len, ty = sh.y - sh.len*sh.vy/sh.vx;
      const grad = ctx.createLinearGradient(sh.x,sh.y,tx,ty);
      grad.addColorStop(0,'rgba(247,240,214,.9)');
      grad.addColorStop(1,'rgba(247,240,214,0)');
      ctx.strokeStyle=grad; ctx.lineWidth=1.6;
      ctx.beginPath(); ctx.moveTo(sh.x,sh.y); ctx.lineTo(tx,ty); ctx.stroke();
      return sh.life<75 && sh.x<W+60 && sh.y<H+60;
    });
    t++;
    requestAnimationFrame(tick);
  })();
}

// ─── Music: imported playlist (IndexedDB) ─────────────────────────────────────
const MS = {
  shuffle: localStorage.getItem('ourdays_music_shuffle')==='1',
  loop: localStorage.getItem('ourdays_music_loop')!=='0',
  tracks: [], order: [], pos: 0, url: null,
  audio: new Audio(), playing: false
};
MS.audio.preload='auto';

function saveMSsettings(){
  localStorage.setItem('ourdays_music_shuffle', MS.shuffle?'1':'0');
  localStorage.setItem('ourdays_music_loop', MS.loop?'1':'0');
}
function buildOrder(){
  MS.order = MS.tracks.map((_,i)=>i);
  if(MS.shuffle){
    for(let i=MS.order.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [MS.order[i],MS.order[j]]=[MS.order[j],MS.order[i]];
    }
  }
}
function playPos(pos){
  if(!MS.tracks.length) return;
  const n = MS.order.length;
  MS.pos = ((pos%n)+n)%n;
  const tr = MS.tracks[MS.order[MS.pos]];
  if(MS.url) URL.revokeObjectURL(MS.url);
  MS.url = URL.createObjectURL(tr.blob);
  MS.audio.src = MS.url;
  MS.audio.play().then(()=>{
    MS.playing=true; updateMusicBtn(); renderMusicPanel();
  }).catch(()=>{});
}
MS.audio.addEventListener('ended',()=>{
  if(MS.pos+1 < MS.order.length){ playPos(MS.pos+1); }
  else if(MS.loop){ buildOrder(); playPos(0); }
  else { MS.playing=false; updateMusicBtn(); renderMusicPanel(); }
});
function togglePlaylist(){
  if(!MS.tracks.length){ addTracks(); return; }
  if(MS.playing){
    MS.audio.pause(); MS.playing=false;
  } else {
    if(MS.audio.src){ MS.audio.play(); MS.playing=true; }
    else { buildOrder(); playPos(0); }
  }
  updateMusicBtn(); renderMusicPanel();
}
function nextTrack(){
  if(!MS.tracks.length) return;
  if(MS.pos+1 < MS.order.length) playPos(MS.pos+1);
  else { buildOrder(); playPos(0); }
}
function toggleShuffle(){ MS.shuffle=!MS.shuffle; saveMSsettings(); buildOrder(); renderMusicPanel(); }
function toggleLoop(){ MS.loop=!MS.loop; saveMSsettings(); renderMusicPanel(); }
function addTracks(){
  const inp=document.createElement('input');
  inp.type='file';
  // Broad list so iOS Files shows m4a/aac/etc., not just what audio/* filters to
  inp.accept='.m4a,.mp3,.aac,.wav,.aiff,.aif,.caf,.flac,.ogg,.oga,.opus,.weba,audio/*';
  inp.multiple=true; inp.style.display='none';
  document.body.appendChild(inp);
  inp.addEventListener('change', async ()=>{
    for(const f of inp.files){
      const rec={
        id:Date.now()+'_'+Math.random().toString(36).slice(2),
        name:f.name.replace(/\.[^.]+$/,''),
        blob:f
      };
      try{ await idbPut('ourdays_music','tracks',rec); MS.tracks.push(rec); }catch(_){}
    }
    buildOrder(); renderMusicPanel();
    document.body.removeChild(inp);
  });
  inp.click();
}
async function delTrack(id){
  const wasCurrent = MS.tracks.length && MS.tracks[MS.order[MS.pos]] &&
                     MS.tracks[MS.order[MS.pos]].id===id;
  try{ await idbDel('ourdays_music','tracks',id); }catch(_){}
  MS.tracks = MS.tracks.filter(t=>t.id!==id);
  if(wasCurrent || !MS.tracks.length){ MS.audio.pause(); MS.playing=false; }
  buildOrder(); updateMusicBtn(); renderMusicPanel();
}
async function loadMusic(){
  try{ MS.tracks = await idbGetAll('ourdays_music','tracks'); buildOrder(); }catch(_){}
}
function updateMusicBtn(){
  const b=document.getElementById('mb');
  b.classList.toggle('on', MS.playing);
  b.textContent = MS.playing ? '♪' : '♩';
}
function renderMusicPanel(){
  const el=document.getElementById('mul');
  let html='';
  if(MS.tracks.length){
    html+=`
      <div class="mu-toggles">
        <button class="mu-tog${MS.shuffle?' on':''}" onclick="toggleShuffle()">🔀 Shuffle</button>
        <button class="mu-tog${MS.loop?' on':''}" onclick="toggleLoop()">🔁 Loop</button>
      </div>
      <div class="mu-controls">
        <button class="mu-big" onclick="togglePlaylist()">${MS.playing?'❚❚  Pause':'▶  Play'}</button>
        <button class="mu-skip" onclick="nextTrack()" aria-label="Next">⏭</button>
      </div>
      <div class="mu-list">`+
      MS.tracks.map(t=>{
        const cur = MS.playing && MS.tracks[MS.order[MS.pos]] &&
                    MS.tracks[MS.order[MS.pos]].id===t.id;
        return `<div class="mu-track${cur?' cur':''}">
          <span class="mu-tn">${cur?'♪ ':''}${escapeHtml(t.name)}</span>
          <button class="mu-del" onclick="delTrack('${t.id}')" aria-label="Remove">🗑</button>
        </div>`;
      }).join('')+
      `</div>`;
  } else {
    html+=`<p class="mu-desc">Add audio files from your device to build a playlist you can shuffle and loop. Stored on this device only.</p>`;
  }
  html+=`<button class="mu-add" onclick="addTracks()">＋ Add Audio Files</button>`;
  el.innerHTML=html;
}
function openMusicPanel(){
  renderMusicPanel();
  document.getElementById('muo').classList.add('vis');
}

// ─── Export / Backup ──────────────────────────────────────────────────────────
function dataURLToBytes(dataURL){
  const b64 = dataURL.slice(dataURL.indexOf(',')+1);
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  return bytes;
}
async function blobToBytes(blob){ return new Uint8Array(await blob.arrayBuffer()); }
function blobToDataURL(blob){
  return new Promise(r=>{ const fr=new FileReader(); fr.onload=()=>r(fr.result); fr.onerror=()=>r(null); fr.readAsDataURL(blob); });
}
function downloadFile(filename, blob){
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=filename; a.style.display='none';
  document.body.appendChild(a); a.click();
  setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); }, 1500);
}
async function saveOrShare(filename, blob, mime){
  try{
    const file=new File([blob], filename, {type: mime||blob.type||'application/octet-stream'});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({files:[file], title:filename});
      return;
    }
  }catch(e){
    if(e && e.name==='AbortError') return;   // user dismissed the share sheet
  }
  downloadFile(filename, blob);
}

// Minimal store-only ZIP (no compression, no dependencies)
const CRC_TABLE=(()=>{const t=new Uint32Array(256);for(let n=0;n<256;n++){let c=n;for(let k=0;k<8;k++)c=(c&1)?(0xEDB88320^(c>>>1)):(c>>>1);t[n]=c>>>0;}return t;})();
function crc32(bytes){let crc=0xFFFFFFFF;for(let i=0;i<bytes.length;i++)crc=(crc>>>8)^CRC_TABLE[(crc^bytes[i])&0xFF];return (crc^0xFFFFFFFF)>>>0;}
function buildZip(files){
  const u16=n=>[n&255,(n>>>8)&255];
  const u32=n=>[n&255,(n>>>8)&255,(n>>>16)&255,(n>>>24)&255];
  const enc=new TextEncoder();
  const d=new Date();
  const dosTime=((d.getHours()<<11)|(d.getMinutes()<<5)|(d.getSeconds()>>1))&0xFFFF;
  const dosDate=(((d.getFullYear()-1980)<<9)|((d.getMonth()+1)<<5)|d.getDate())&0xFFFF;
  const parts=[], central=[]; let offset=0;
  for(const f of files){
    const name=Array.from(enc.encode(f.name));
    const data=f.bytes, crc=crc32(data), sz=data.length;
    const lh=Uint8Array.from([].concat(u32(0x04034b50),u16(20),u16(0),u16(0),u16(dosTime),u16(dosDate),u32(crc),u32(sz),u32(sz),u16(name.length),u16(0),name));
    parts.push(lh, data);
    central.push(Uint8Array.from([].concat(u32(0x02014b50),u16(20),u16(20),u16(0),u16(0),u16(dosTime),u16(dosDate),u32(crc),u32(sz),u32(sz),u16(name.length),u16(0),u16(0),u16(0),u16(0),u32(0),u32(offset),name)));
    offset += lh.length + data.length;
  }
  let cdSize=0; central.forEach(c=>cdSize+=c.length);
  const eocd=Uint8Array.from([].concat(u32(0x06054b50),u16(0),u16(0),u16(files.length),u16(files.length),u32(cdSize),u32(offset),u16(0)));
  return new Blob([...parts,...central,eocd],{type:'application/zip'});
}

function collectNoteEntries(){
  const out=[];
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    const m=k && k.match(/^ourdays_([^_]+)_(\d{4}-\d{2}-\d{2})$/);
    if(m) out.push({ person:m[1], date:m[2], notes:loadNotes(m[1],m[2]) });
  }
  return out;
}

async function exportZIP(){
  const files=[];
  PEOPLE.forEach(p=>{ const ph=loadPhoto(p.id); if(ph) files.push({name:`${p.id}/card.jpg`, bytes:dataURLToBytes(ph)}); });
  const dp=await idbGetAll('ourdays_pix','photos').catch(()=>[]);
  const pad=n=>String(n).padStart(2,'0');
  for(const r of dp){
    const t=new Date(r.ts||Date.now());
    const stamp=`${r.date}_${pad(t.getHours())}${pad(t.getMinutes())}${pad(t.getSeconds())}`;
    files.push({name:`${r.person}/${stamp}_${String(r.id).slice(-4)}.jpg`, bytes: await blobToBytes(r.blob)});
  }
  const vn=await idbGetAll('ourdays_voice','voice').catch(()=>[]);
  for(const r of vn){
    if(!r.blob) continue;
    const t=new Date(r.ts||Date.now());
    const stamp=`${r.date}_${pad(t.getHours())}${pad(t.getMinutes())}${pad(t.getSeconds())}`;
    const ext=(r.mime||'').indexOf('webm')>=0?'webm':'m4a';
    files.push({name:`${r.person}/voice/${stamp}_${String(r.id).slice(-4)}.${ext}`, bytes: await blobToBytes(r.blob)});
  }
  if(!files.length){ alert('No photos or recordings to export yet.'); return; }
  await saveOrShare('our-days-media.zip', buildZip(files), 'application/zip');
}

function importBackup(){
  const inp=document.createElement('input');
  inp.type='file'; inp.accept='.json,application/json'; inp.style.display='none';
  document.body.appendChild(inp);
  inp.addEventListener('change', async ()=>{
    const file=inp.files[0]; document.body.removeChild(inp);
    if(!file) return;
    let data;
    try{ data=JSON.parse(await file.text()); }catch(_){ alert("That file isn't a valid Our Days backup."); return; }
    if(!data || typeof data!=='object'){ alert("That file isn't a valid Our Days backup."); return; }
    if(data.app!=='Our Days' && !confirm("This doesn't look like an Our Days backup. Import anyway?")) return;
    let nNotes=0, nCard=0, nDay=0;
    (data.notes||[]).forEach(entry=>{
      if(!entry||!entry.person||!entry.date) return;
      const cur=loadNotes(entry.person,entry.date);
      const ids=new Set(cur.map(n=>n.id)); let changed=false;
      (entry.notes||[]).forEach(n=>{ if(n&&n.text&&n.text.trim()&&!ids.has(n.id)){ cur.push(n); ids.add(n.id); nNotes++; changed=true; } });
      if(changed){ cur.sort((a,b)=>(a.ts||0)-(b.ts||0)); saveNotes(entry.person,entry.date,cur); }
    });
    Object.entries(data.cardPhotos||{}).forEach(([pid,info])=>{
      if(info&&info.dataUrl&&!loadPhoto(pid)){
        localStorage.setItem(`ourdays_photo_${pid}`,info.dataUrl);
        if(info.ts) localStorage.setItem(`ourdays_photo_${pid}_ts`,info.ts);
        nCard++;
      }
    });
    const existing=await idbGetAll('ourdays_pix','photos').catch(()=>[]);
    const exIds=new Set(existing.map(r=>r.id));
    for(const d of (data.dayPhotos||[])){
      if(d&&d.id&&d.dataUrl&&!exIds.has(d.id)){
        try{ const blob=await (await fetch(d.dataUrl)).blob(); await idbPut('ourdays_pix','photos',{id:d.id,person:d.person,date:d.date,ts:d.ts,blob}); nDay++; }catch(_){}
      }
    }
    let nVoice=0;
    const exV=await idbGetAll('ourdays_voice','voice').catch(()=>[]);
    const exVIds=new Set(exV.map(r=>r.id));
    const vDates=new Set();
    for(const v of (data.voice||[])){
      if(v&&v.id&&!exVIds.has(v.id)&&(v.dataUrl||v.transcript)){
        try{
          const blob=v.dataUrl?await (await fetch(v.dataUrl)).blob():null;
          await idbPut('ourdays_voice','voice',{id:v.id,person:v.person,date:v.date,ts:v.ts,blob,mime:v.mime||'',transcript:v.transcript||''});
          vDates.add(v.person+'|'+v.date); nVoice++;
        }catch(_){}
      }
    }
    for(const k of vDates){ const [pid,date]=k.split('|'); setVoiceFlag(pid,date,true); }
    renderHand();
    alert(`Imported ${nNotes} note(s), ${nCard} card photo(s), ${nDay} day photo(s), ${nVoice} voice note(s).`);
  });
  inp.click();
}

function wireExport(btnId, fn){
  const btn=document.getElementById(btnId);
  btn.addEventListener('click', async ()=>{
    if(btn.dataset.busy) return;
    btn.dataset.busy='1'; btn.disabled=true;
    const label=btn.querySelector('b'); const orig=label.textContent; label.textContent='Preparing…';
    try{ await fn(); }catch(e){ alert('Sorry, that export failed: '+((e&&e.message)||e)); }
    label.textContent=orig; btn.disabled=false; delete btn.dataset.busy;
  });
}

// ─── Photo lightbox (tap any .zoomable image → full-screen; pinch/pan/swipe) ────
(function(){
  const lb=document.getElementById('lb'), img=document.getElementById('lbi');
  let scale=1, tx=0, ty=0, mode=null, moved=false;
  let sx=0, sy=0, bx=0, by=0, pinchDist=0, pinchScale=1;
  const pts=new Map();

  const apply=()=>{ img.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`; };
  function resetView(){ scale=1; tx=0; ty=0; img.style.transition='none'; apply(); lb.style.background=''; }
  function dist(){ const a=[...pts.values()]; return Math.hypot(a[0].x-a[1].x, a[0].y-a[1].y); }

  window.openLightbox=function(src){
    if(!src) return;
    resetView(); img.src=src; lb.classList.add('vis');
  };
  function close(){ lb.classList.remove('vis'); setTimeout(()=>{ if(!lb.classList.contains('vis')) img.removeAttribute('src'); }, 280); }
  document.getElementById('lbc').addEventListener('click', close);

  lb.addEventListener('pointerdown', e=>{
    if(lb.setPointerCapture) try{lb.setPointerCapture(e.pointerId);}catch(_){}
    pts.set(e.pointerId,{x:e.clientX,y:e.clientY});
    img.style.transition='none'; moved=false;
    if(pts.size===2){ mode='pinch'; pinchDist=dist()||1; pinchScale=scale; }
    else { sx=e.clientX; sy=e.clientY; bx=tx; by=ty; mode = scale>1?'pan':'tap'; }
  });
  lb.addEventListener('pointermove', e=>{
    if(!pts.has(e.pointerId)) return;
    pts.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(mode==='pinch' && pts.size>=2){
      scale=Math.max(1, Math.min(5, pinchScale*(dist()/pinchDist))); apply(); return;
    }
    const dx=e.clientX-sx, dy=e.clientY-sy;
    if(Math.abs(dx)>8||Math.abs(dy)>8) moved=true;
    if(mode==='pan'){ tx=bx+dx; ty=by+dy; apply(); }
    else if(mode==='tap' || mode==='dismiss'){
      if(mode==='tap' && moved && Math.abs(dy)>Math.abs(dx)) mode='dismiss';
      if(mode==='dismiss'){
        const p=Math.min(1, Math.abs(dy)/320);
        img.style.transform=`translate(${dx*0.25}px,${dy}px) scale(${(1-p*0.25).toFixed(3)})`;
        lb.style.background=`rgba(6,6,16,${(0.96*(1-p*0.9)).toFixed(2)})`;
        ty=dy;
      }
    }
  });
  function up(e){
    pts.delete(e.pointerId);
    const m=mode;
    img.style.transition='transform .22s ease';
    if(pts.size>=1){
      if(m==='pinch'){ const l=[...pts.values()][0]; sx=l.x; sy=l.y; bx=tx; by=ty; mode=scale>1?'pan':'tap'; moved=false; }
      return;
    }
    if(m==='dismiss'){ if(Math.abs(ty)>120) close(); else { ty=0;tx=0;apply(); lb.style.background=''; } }
    else if(m==='pinch'){ if(scale<=1.03){ resetView(); img.style.transition='transform .22s ease'; } }
    else if(m==='tap'){ if(!moved && scale===1) close(); }
    mode=null;
  }
  lb.addEventListener('pointerup', up);
  lb.addEventListener('pointercancel', up);

  // Open the lightbox when any image marked .zoomable is tapped
  document.addEventListener('click', e=>{
    const t=e.target;
    if(t && t.tagName==='IMG' && t.classList.contains('zoomable')){
      const src=t.currentSrc||t.src;
      if(src && src.indexOf('image/svg')<0) openLightbox(src);
    }
  });
})();

    <div class="ct-top">${escapeHtml(person.name)}</div>
    <div class="ct-body">
      <div class="ct-grad" style="background:${person.grad}"></div>
      <div class="ct-art"></div>
      <div class="ct-sheen"></div>
      <div class="ct-init">${person.initial}</div>
      <div class="ct-scrim"></div>
      <div class="ct-rel">${escapeHtml(person.relation)}</div>

  if(photo) front.querySelector('.ct-art').style.backgroundImage=`url("${photo}")`;

  fcPixUrls.forEach(u=>URL.revokeObjectURL(u)); fcPixUrls=[];

  const anything = notes.length||pix.length||voices.length;
  const notesHtml = notes.length
    ? notes.map(n=>`<div class="fc-note"><div class="fc-note-t">${fmtTime(n.ts)}${n.edited?' · edited':''}</div><div class="fc-note-x">${escapeHtml(n.text).replace(/\n/g,'<br>')}</div></div>`).join('')
    : (anything?'':`<div class="fc-empty">No notes yet today.</div>`);
  const voiceHtml = voices.map(v=>{
    let play='';
    if(v.blob){ const u=URL.createObjectURL(v.blob); fcPixUrls.push(u); play=`<button class="evoice-play" onclick="playVoiceUrl('${u}')">▶</button>`; }
    else play=`<button class="evoice-play" style="background:#b0a890" disabled>🎙</button>`;
    return `<div class="evoice">${play}<div class="evoice-c"><div class="evoice-t">${fmtTime(v.ts)} · 🎙</div><div class="evoice-x${v.transcript?'':' none'}">${v.transcript?escapeHtml(v.transcript):'Voice recording'}</div></div></div>`;
  }).join('');
  const pixHtml = pix.length
    ? `<div class="fc-pix">${pix.map(r=>{const u=URL.createObjectURL(r.blob);fcPixUrls.push(u);return `<img src="${u}" class="zoomable" alt="day photo">`;}).join('')}</div>`
    : '';
  const back=document.getElementById('fc-back');
  back.className='fc-face fc-back';
  back.innerHTML=`
    <div class="fc-back-head" style="background:${person.grad}">
      <div class="fc-back-name">${escapeHtml(person.name)}</div>
      <div class="fc-back-date">${fmtShort(date)} · tap here to flip back</div>
    </div>
    <div class="fc-back-body">
      <div class="fc-back-prompt">${escapeHtml(person.prompt)}</div>
      ${notesHtml}
      ${voiceHtml}
      ${pixHtml}
      <button class="fc-edit">✎ Write / edit notes</button>
    </div>`;

  fc.classList.add('vis');
}
function closeFullCard(){
  const fc=document.getElementById('fc');
  fc.classList.remove('vis');
  setTimeout(()=>fc.classList.remove('flipped'), 320);
  fcPixUrls.forEach(u=>URL.revokeObjectURL(u)); fcPixUrls=[];
  currentFullPerson=null;
}
document.getElementById('fcc').addEventListener('click', closeFullCard);
document.getElementById('fc').addEventListener('click', e=>{
  const fc=document.getElementById('fc');
  if(e.target===fc){ closeFullCard(); return; }                 // backdrop
  if(e.target.closest('.fc-edit')){ const p=currentFullPerson; closeFullCard(); if(p) openEditor(p); return; }

});

// ─── Voice notes (on-device recording + optional online transcript) ────────────
function vflagKey(id,date){ return `ourdays_vflag_${id}_${date}`; }
function hasVoice(id,date){ return localStorage.getItem(vflagKey(id,date))==='1'; }
function setVoiceFlag(id,date,on){ if(on) localStorage.setItem(vflagKey(id,date),'1'); else localStorage.removeItem(vflagKey(id,date)); }
function hasEntry(id,date){ return hasNotes(id,date) || hasVoice(id,date); }
async function voiceNotesFor(person,date){
  const all=await idbGetAll('ourdays_voice','voice').catch(()=>[]);
  return all.filter(r=>r.person===person && r.date===date).sort((a,b)=>a.ts-b.ts);
}
async function refreshVoiceFlag(id,date){ setVoiceFlag(id,date,(await voiceNotesFor(id,date)).length>0); }

const VR={ rec:null, stream:null, chunks:[], blob:null, mime:'', recog:null, finalT:'', recording:false, t0:0, timer:null, url:null, stopResolve:null };
const $=id=>document.getElementById(id);
function vrFmt(ms){ const s=Math.floor(ms/1000); return Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); }
function vrReset(){
  const v=$('vr'); v.classList.remove('rec','has-audio');
  $('vr-timer').textContent='0:00'; $('vr-status').textContent='Tap to start recording';
  $('vr-trans').value=''; $('vr-note').textContent='';
  $('vr-keepaudio').checked=true; $('vr-keeptrans').checked=true;
  if(VR.url){ URL.revokeObjectURL(VR.url); VR.url=null; }
  $('vr-audio').removeAttribute('src');
  VR.blob=null; VR.chunks=[]; VR.finalT=''; VR.recording=false;
  clearInterval(VR.timer); VR.timer=null;
}
function openVoicePanel(){
  if(!activePerson) return;
  if(!navigator.mediaDevices || !window.MediaRecorder){ alert("Audio recording isn't supported in this browser."); return; }
  vrReset(); $('vr').classList.add('vis');
}
function closeVoicePanel(){
  if(VR.recording) stopRecording();
  stopRecognition();
  if(VR.stream){ VR.stream.getTracks().forEach(t=>t.stop()); VR.stream=null; }
  $('vr').classList.remove('vis'); vrReset();
}
async function startRecording(){
  try{ VR.stream=await navigator.mediaDevices.getUserMedia({audio:true}); }
  catch(e){ $('vr-status').textContent='Microphone permission denied.'; return; }
  let mime='';
  if(MediaRecorder.isTypeSupported('audio/mp4')) mime='audio/mp4';
  else if(MediaRecorder.isTypeSupported('audio/webm')) mime='audio/webm';
  try{ VR.rec = mime? new MediaRecorder(VR.stream,{mimeType:mime}) : new MediaRecorder(VR.stream); }
  catch(_){ VR.rec=new MediaRecorder(VR.stream); }
  VR.mime=VR.rec.mimeType||mime||'audio/mp4'; VR.chunks=[];
  VR.rec.ondataavailable=e=>{ if(e.data&&e.data.size) VR.chunks.push(e.data); };
  VR.rec.onstop=()=>{
    VR.blob=new Blob(VR.chunks,{type:VR.mime});
    if(VR.stream){ VR.stream.getTracks().forEach(t=>t.stop()); VR.stream=null; }
    if(VR.url) URL.revokeObjectURL(VR.url);
    VR.url=URL.createObjectURL(VR.blob);
    $('vr-audio').src=VR.url; $('vr').classList.add('has-audio');
    if(VR.stopResolve){ const r=VR.stopResolve; VR.stopResolve=null; r(); }
  };
  VR.rec.start(); VR.recording=true;
  $('vr').classList.add('rec'); $('vr').classList.remove('has-audio');
  $('vr-status').textContent='Recording… tap to stop';
  VR.t0=Date.now(); VR.timer=setInterval(()=>{ $('vr-timer').textContent=vrFmt(Date.now()-VR.t0); },250);
  startRecognition();
}
function stopRecording(){
  return new Promise(res=>{
    VR.recording=false; clearInterval(VR.timer); VR.timer=null;
    $('vr').classList.remove('rec'); $('vr-status').textContent='Recorded · review below';
    stopRecognition();
    if(!VR.rec || VR.rec.state==='inactive'){ res(); return; }
    VR.stopResolve=res;
    try{ VR.rec.stop(); }catch(_){ if(VR.stopResolve){ VR.stopResolve=null; res(); } }
  });
}
function startRecognition(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  const ta=$('vr-trans'), note=$('vr-note');
  if(!SR){ note.textContent='Auto-transcript unavailable here — type your note below.'; return; }
  try{
    VR.recog=new SR();
    VR.recog.continuous=true; VR.recog.interimResults=true; VR.recog.lang='en-US';
    VR.finalT = ta.value ? ta.value+' ' : '';
    VR.recog.onresult=e=>{
      let interim='';
      for(let i=e.resultIndex;i<e.results.length;i++){
        const t=e.results[i][0].transcript;
        if(e.results[i].isFinal) VR.finalT+=t+' '; else interim+=t;
      }
      ta.value=(VR.finalT+interim).replace(/\s+/g,' ').replace(/^\s+/,'');
    };
    VR.recog.onerror=ev=>{ if(ev.error==='not-allowed'||ev.error==='service-not-allowed') note.textContent='Transcription blocked — type your note below.'; };
    VR.recog.start();
  }catch(_){ note.textContent='Auto-transcript unavailable — type your note below.'; }
}
function stopRecognition(){ if(VR.recog){ try{VR.recog.stop();}catch(_){}; VR.recog=null; } }

$('vr-rec').addEventListener('click', async ()=>{ if(VR.recording) await stopRecording(); else startRecording(); });
$('vr-x').addEventListener('click', closeVoicePanel);
$('vr-discard').addEventListener('click', closeVoicePanel);
$('vr-save').addEventListener('click', async ()=>{
  if(VR.recording) await stopRecording();
  const keepA=$('vr-keepaudio').checked, keepT=$('vr-keeptrans').checked;
  const trans=$('vr-trans').value.trim();
  const haveAudio=keepA&&VR.blob, haveTrans=keepT&&!!trans;
  if(!haveAudio && !haveTrans){ alert('Nothing to save — record audio or keep a transcript.'); return; }
  const person=activePerson.id, date=today();
  const rec={ id:Date.now()+'_'+Math.random().toString(36).slice(2), person, date, ts:Date.now(),
    blob: haveAudio?VR.blob:null, mime: haveAudio?VR.mime:'', transcript: haveTrans?trans:'' };
  await idbPut('ourdays_voice','voice',rec).catch(()=>{});
  setVoiceFlag(person,date,true);
  closeVoicePanel(); renderEditorVoices(); renderHand();
});

let editorVoiceUrls=[];
let voicePlayer=null;
function playVoiceUrl(url){ if(voicePlayer) voicePlayer.pause(); voicePlayer=new Audio(url); voicePlayer.play().catch(()=>{}); }
async function renderEditorVoices(){
  const wrap=$('evoices');
  editorVoiceUrls.forEach(u=>URL.revokeObjectURL(u)); editorVoiceUrls=[];
  if(!activePerson){ wrap.innerHTML=''; return; }
  const list=await voiceNotesFor(activePerson.id, today());
  wrap.innerHTML=list.map(v=>{
    let play;
    if(v.blob){ const u=URL.createObjectURL(v.blob); editorVoiceUrls.push(u); play=`<button class="evoice-play" onclick="playVoiceUrl('${u}')">▶</button>`; }
    else play=`<button class="evoice-play" style="background:#b0a890" disabled>🎙</button>`;
    return `<div class="evoice">${play}<div class="evoice-c"><div class="evoice-t">${fmtTime(v.ts)}</div><div class="evoice-x${v.transcript?'':' none'}">${v.transcript?escapeHtml(v.transcript):'Voice recording'}</div></div><button class="evoice-del" onclick="deleteVoice('${v.id}')">Delete</button></div>`;
  }).join('');
}
async function deleteVoice(id){
  if(!confirm('Delete this voice note?')) return;
  await idbDel('ourdays_voice','voice',id).catch(()=>{});
  if(activePerson) await refreshVoiceFlag(activePerson.id, today());
  renderEditorVoices(); renderHand();
}
$('evoice-add').addEventListener('click', openVoicePanel);

// ─── Landing zone + tap-to-enlarge floating card ───────────────────────────────
const CARD_AR = 366/232;   // card height/width
function cardFrontMarkup(person){
  return `
    <div class="ct-top">${escapeHtml(person.name)}</div>
    <div class="ct-body">
      <div class="ct-grad" style="background:${person.grad}"></div>
      <div class="ct-art"></div>
      <div class="ct-sheen"></div>
      <div class="ct-init">${person.initial}</div>
      <div class="ct-scrim"></div>
      <div class="ct-rel">${escapeHtml(person.relation)}</div>
      <div class="ct-dot"></div>
    </div>`;
}
function landingZoneRect(){
  const peb=document.getElementById('peb').getBoundingClientRect();
  const cardR=cards[activeIdx]?cards[activeIdx].getBoundingClientRect():{top:innerHeight*0.62};
  const gapTop=peb.bottom, gapBottom=cardR.top;
  const midY=(gapTop+gapBottom)/2;
  const size=Math.min(innerWidth*0.78, Math.max(140,(gapBottom-gapTop)-14));
  return { left:(innerWidth-size)/2, top:midY-size/2, width:size, height:size, cx:innerWidth/2, cy:midY };
}
function positionLandingZone(){
  const lz=document.getElementById('lz'); if(!lz) return;
  const r=landingZoneRect();
  lz.style.left=r.left+'px'; lz.style.top=r.top+'px';
  lz.style.width=r.width+'px'; lz.style.height=r.height+'px';
}

let fcardActive=false, fcardPerson=null;
function sourceCardEl(person){ const i=PEOPLE.indexOf(person); return cards[i]?cards[i].querySelector('.ct'):null; }

function enlargeCard(person){
  if(fcardActive) return;
  fcardActive=true; fcardPerson=person;
  const srcEl=sourceCardEl(person);
  const src=srcEl?srcEl.getBoundingClientRect():null;
  const zone=landingZoneRect();
  const tW=Math.min(innerWidth*0.9, zone.width*1.32);
  const tH=tW*CARD_AR;
  const tLeft=zone.cx - tW/2, tTop=zone.cy - tH/2;

  const fc=document.getElementById('fcard');
  const photo=loadPhoto(person.id);
  fc.className=(photo?'has-photo ':'')+(hasEntry(person.id,today())?'done':'');
  fc.style.setProperty('--cc', person.band);
  fc.innerHTML=cardFrontMarkup(person);
  if(photo) fc.querySelector('.ct-art').style.backgroundImage=`url("${photo}")`;

  // start at the carousel card's spot, then glide to the zone centre, enlarging
  const s = src || {left:tLeft,top:tTop,width:tW,height:tH};
  fc.style.transition='none';
  fc.style.left=s.left+'px'; fc.style.top=s.top+'px'; fc.style.width=s.width+'px'; fc.style.height=s.height+'px';
  fc.style.display='flex';
  if(srcEl) srcEl.style.visibility='hidden';
  requestAnimationFrame(()=>{
    fc.style.transition='left .42s cubic-bezier(.2,.85,.25,1),top .42s cubic-bezier(.2,.85,.25,1),width .42s cubic-bezier(.2,.85,.25,1),height .42s cubic-bezier(.2,.85,.25,1)';
    fc.style.left=tLeft+'px'; fc.style.top=tTop+'px'; fc.style.width=tW+'px'; fc.style.height=tH+'px';
  });

  const x=document.getElementById('fcx');
  x.style.display='flex'; x.style.opacity='0';
  x.style.left=(zone.cx-23)+'px';
  x.style.top=(tTop+tH+16)+'px';
  setTimeout(()=>{ x.style.transition='opacity .3s'; x.style.opacity='1'; }, 320);
}
function closeFcard(){
  if(!fcardActive) return;
  const fc=document.getElementById('fcard'), x=document.getElementById('fcx');
  const srcEl=sourceCardEl(fcardPerson);
  const src=srcEl?srcEl.getBoundingClientRect():null;
  x.style.display='none';
  if(src){
    fc.style.transition='left .38s ease,top .38s ease,width .38s ease,height .38s ease';
    fc.style.left=src.left+'px'; fc.style.top=src.top+'px'; fc.style.width=src.width+'px'; fc.style.height=src.height+'px';
    setTimeout(()=>{ fc.style.display='none'; renderHandInstant(); }, 380);
  } else { fc.style.display='none'; renderHandInstant(); }
  fcardActive=false; fcardPerson=null;
}
function openNotesSide(person){
  // Pass 1: present the editor full-screen as the notes side
  const fc=document.getElementById('fcard'), x=document.getElementById('fcx');
  const srcEl=sourceCardEl(person);
  fc.style.display='none'; x.style.display='none';
  if(srcEl) srcEl.style.visibility='';
  fcardActive=false; fcardPerson=null;
  openEditor(person);
  document.getElementById('ec').classList.add('full');
}
document.getElementById('fcx').addEventListener('click', closeFcard);
document.getElementById('fcard').addEventListener('click', ()=>{ if(fcardActive && fcardPerson) openNotesSide(fcardPerson); });
window.addEventListener('resize', ()=>{ positionLandingZone(); });

// ─── Init ─────────────────────────────────────────────────────────────────────
function init(){
  document.getElementById('date-label').textContent = fmtFull(today());
  document.getElementById('greeting').textContent = 'Remember Always';
  initStars();
  renderHand();
  loadMusic();
  [300,800].forEach(t=>setTimeout(positionLandingZone,t));
  // rebuild voice "done" flags from storage, then refresh the dots
  idbGetAll('ourdays_voice','voice').then(list=>{
    if(!list || !list.length) return;
    const seen=new Set();
    list.forEach(v=>{ const k=v.person+'|'+v.date; if(!seen.has(k)){ seen.add(k); setVoiceFlag(v.person,v.date,true); } });
    renderHand();
  }).catch(()=>{});
}
init();
